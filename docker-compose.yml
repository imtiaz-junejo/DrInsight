services:
  postgres:
    image: postgres:16-alpine
    container_name: drinsight-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: drinsight
      POSTGRES_PASSWORD: drinsight
      POSTGRES_DB: drinsight
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U drinsight -d drinsight"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: drinsight-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: drinsight-backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://drinsight:drinsight@postgres:5432/drinsight?schema=public
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - full

  frontend:
    build:
      context: ./frontend
    container_name: drinsight-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env.local
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
      NEXT_PUBLIC_WS_URL: http://localhost:4000
    depends_on:
      - backend
    profiles:
      - full

  ai-service:
    build:
      context: ./ai-service
    container_name: drinsight-ai
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./ai-service/.env
    profiles:
      - full

volumes:
  postgres_data:
