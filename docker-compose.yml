services:
  postgres:
    image: postgres:16-alpine
    container_name: drinsight-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: drinsight
      POSTGRES_PASSWORD: drinsight_secret
      POSTGRES_DB: drinsight
    volumes:
      - drinsight-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U drinsight -d drinsight"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: drinsight-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - drinsight-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  drinsight-postgres-data:
  drinsight-redis-data:
