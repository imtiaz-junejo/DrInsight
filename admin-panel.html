<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel — The Dr Insight</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --blue:#1a56a0;--blue-dark:#0f3d7a;--blue-light:#e8f0fb;--blue-mid:#4a90d9;
  --teal:#0891b2;--green:#059669;--red:#dc2626;--amber:#f59e0b;--purple:#7c3aed;
  --gray-50:#f8fafc;--gray-100:#f1f5f9;--gray-200:#e2e8f0;--gray-300:#cbd5e1;
  --gray-400:#94a3b8;--gray-500:#64748b;--gray-600:#475569;--gray-700:#334155;--gray-800:#1e293b;--gray-900:#0f172a;
  --font-d:'Playfair Display',serif;--font-b:'DM Sans',sans-serif;
  --r:10px;--rl:16px;--t:all .2s ease;
  /* aliases matching author-bio.html's design tokens, so the live preview below can reuse its CSS classes verbatim */
  --white:#fff;--font-display:var(--font-d);--font-body:var(--font-b);--radius:var(--r);--radius-lg:var(--rl);--transition:var(--t);
}
/* ════════════════════════════════════════════════════════════════
   AUTHOR-BIO.HTML COMPONENT STYLES — imported verbatim so the live
   preview in the Doctor Profile editor renders pixel-identical to
   the public author-bio.html page (same classes, same colors).
   ════════════════════════════════════════════════════════════════ */
.abio .hero-banner{background:linear-gradient(135deg,var(--blue-dark) 0%,var(--blue) 55%,var(--teal) 100%);color:#fff;padding:36px 24px;position:relative;overflow:hidden;border-radius:var(--radius-lg)}
.abio .hero-inner{max-width:1240px;margin:auto;position:relative;z-index:1;display:flex;align-items:center;gap:28px;flex-wrap:wrap}
.abio .hero-av-wrap{flex-shrink:0;position:relative}
.abio .hero-photo{width:110px;height:110px;border-radius:50%;background:linear-gradient(135deg,#4a90d9,#7c3aed);display:flex;align-items:center;justify-content:center;font-size:2.6rem;border:4px solid rgba(255,255,255,.32);box-shadow:0 8px 32px rgba(0,0,0,.25);position:relative;overflow:hidden}
.abio .hero-photo img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.abio .hero-av-online{position:absolute;bottom:6px;right:6px;width:18px;height:18px;background:var(--green);border-radius:50%;border:3px solid rgba(255,255,255,.9)}
.abio .hero-verified-ring{position:absolute;top:2px;right:2px;width:24px;height:24px;background:var(--green);border-radius:50%;border:3px solid #fff;display:flex;align-items:center;justify-content:center;font-size:.62rem}
.abio .hero-info{flex:1;color:#fff;min-width:0}
.abio .hero-eyebrow{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.abio .hero-badge{display:inline-flex;align-items:center;gap:5px;font-size:.7rem;font-weight:700;padding:4px 12px;border-radius:50px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25)}
.abio .hero-badge.verified{background:rgba(5,150,105,.3);border-color:rgba(5,150,105,.5);color:#6ee7b7}
.abio .hero-info h1{font-family:var(--font-display);font-size:clamp(1.3rem,3vw,2rem);font-weight:700;line-height:1.2;margin-bottom:5px;color:#fff}
.abio .hero-cred{font-size:.9rem;opacity:.88;font-weight:500;margin-bottom:5px}
.abio .hero-meta{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:14px;margin-top:6px}
.abio .hero-meta-item{display:flex;align-items:center;gap:6px;font-size:.78rem;opacity:.88}
.abio .hero-stats{display:flex;gap:20px;flex-wrap:wrap;margin-bottom:16px}
.abio .hero-stat{text-align:center}
.abio .hero-stat strong{display:block;font-family:var(--font-display);font-size:1.25rem;font-weight:700;color:#93c5fd;line-height:1}
.abio .hero-stat span{font-size:.64rem;opacity:.82;margin-top:2px;display:block}
.abio .action-btns{display:flex;gap:9px;flex-wrap:wrap}
.abio .action-btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:10px;font-size:.8rem;font-weight:700;cursor:default;border:none;font-family:inherit}
.abio .action-btn.primary{background:#fff;color:var(--blue-dark)}
.abio .action-btn.outline{background:rgba(255,255,255,.13);color:#fff;border:1.5px solid rgba(255,255,255,.32)}
.abio .s-card{background:#fff;border:1.5px solid var(--gray-200);border-radius:var(--radius-lg);padding:22px;margin-bottom:18px}
.abio .s-card:last-child{margin-bottom:0}
.abio .s-title{display:flex;align-items:center;gap:8px;font-family:var(--font-display);font-size:1rem;font-weight:700;color:var(--gray-900);margin-bottom:14px;padding-bottom:9px;border-bottom:2px solid var(--blue-light)}
.abio .callout-box{background:var(--blue-light);border:1px solid #bfdbfe;border-radius:var(--radius);padding:12px 14px;margin-bottom:16px}
.abio .callout-box p{font-size:.82rem;color:var(--blue-dark);line-height:1.6}
.abio .exp-tags{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}
.abio .exp-tag{padding:6px 14px;border-radius:50px;font-size:.76rem;font-weight:600;background:var(--blue-light);color:var(--blue);border:1px solid #bfdbfe}
.abio .timeline{display:flex;flex-direction:column;gap:0;position:relative}
.abio .timeline::before{content:'';position:absolute;left:14px;top:8px;bottom:8px;width:2px;background:linear-gradient(to bottom,var(--blue),var(--teal))}
.abio .tl-item{display:flex;gap:16px;padding-bottom:18px;position:relative}
.abio .tl-dot{width:28px;height:28px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;font-size:.7rem;color:#fff;flex-shrink:0;z-index:1;border:3px solid #fff;box-shadow:0 0 0 2px var(--blue)}
.abio .tl-title{font-size:.86rem;font-weight:600;color:var(--gray-900)}
.abio .tl-inst{font-size:.78rem;color:var(--gray-500);margin-top:1px}
.abio .cert-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:10px}
.abio .cert-card{background:var(--gray-50);border:1.5px solid var(--gray-200);border-radius:var(--radius);padding:12px 14px;display:flex;align-items:flex-start;gap:10px}
.abio .cert-ico{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.9rem;flex-shrink:0;background:#fff;border:1px solid var(--gray-200)}
.abio .cert-card h4{font-size:.76rem;font-weight:700;color:var(--gray-900);margin-bottom:2px;line-height:1.35}
.abio .cert-card p{font-size:.7rem;color:var(--gray-500)}
.abio .award-list{display:flex;flex-direction:column;gap:10px}
.abio .award-item{display:flex;align-items:flex-start;gap:12px;padding:12px;background:var(--gray-50);border-radius:var(--radius);border:1px solid var(--gray-200)}
.abio .award-ico{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--amber),#f59e0b);display:flex;align-items:center;justify-content:center;font-size:.95rem;flex-shrink:0}
.abio .award-item h4{font-size:.82rem;font-weight:700;color:var(--gray-900);margin-bottom:2px}
.abio .award-item p{font-size:.76rem;color:var(--gray-500)}
.abio .speak-item{display:flex;flex-direction:column;gap:2px;padding:10px 12px;background:var(--gray-50);border-radius:var(--radius);border-left:3px solid var(--blue);margin-bottom:10px}
.abio .speak-item h4{font-size:.82rem;font-weight:600;color:var(--gray-900);margin-bottom:2px;line-height:1.35}
.abio .speak-item p{font-size:.72rem;color:var(--gray-500)}
.abio .speak-type{font-size:.68rem;font-weight:700;padding:2px 8px;border-radius:50px;display:inline-block;margin-top:3px;width:fit-content}
.abio .speak-conference{background:#e0f7fa;color:var(--teal)}
.abio .speak-lecture{background:var(--blue-light);color:var(--blue)}
.abio .speak-webinar{background:#f3f0ff;color:var(--purple)}
.abio .role-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.abio .role-item{background:var(--gray-50);border-radius:var(--radius);padding:14px;border:1px solid var(--gray-200)}
.abio .role-item h4{font-size:.74rem;font-weight:700;color:var(--gray-500);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.abio .role-item p{font-size:.86rem;font-weight:500;color:var(--gray-900)}
.abio .coi-box{background:#f0fdf4;border:1px solid #a7f3d0;border-radius:var(--radius);padding:14px 16px}
.abio .coi-box p{font-size:.82rem;color:#065f46;line-height:1.65}
.abio .coi-box p+p{font-size:.72rem;color:#047857;margin-top:6px}
@media(max-width:640px){.abio .hero-inner{flex-direction:column;text-align:center}.abio .action-btns{justify-content:center}.abio .role-grid{grid-template-columns:1fr}.abio .hero-stats{justify-content:center}.abio .hero-eyebrow{justify-content:center}}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-b);background:var(--gray-50);color:var(--gray-800);font-size:14px}
a{color:inherit;text-decoration:none}
ul{list-style:none}
button{font-family:var(--font-b)}
.app{display:grid;grid-template-columns:250px 1fr;min-height:100vh}
.sidebar{background:var(--gray-900);color:#cbd5e1;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
.sb-logo{display:flex;align-items:center;gap:10px;padding:18px 18px;border-bottom:1px solid #1e293b}
.sb-logo-ic{width:34px;height:34px;background:linear-gradient(135deg,var(--blue),var(--teal));border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:1rem;flex-shrink:0}
.sb-logo-txt{font-family:var(--font-d);font-size:1.1rem;font-weight:700;color:#fff}
.sb-logo-sub{font-size:.62rem;color:#64748b;letter-spacing:.1em;text-transform:uppercase}
.sb-nav{padding:10px;flex:1}
.sb-section-lbl{font-size:.62rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#475569;padding:14px 12px 5px}
.sb-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;font-size:.82rem;font-weight:500;cursor:pointer;transition:var(--t);margin-bottom:1px;color:#94a3b8}
.sb-item:hover{background:#1e293b;color:#fff}
.sb-item.active{background:var(--blue);color:#fff;font-weight:600}
.sb-ico{width:18px;text-align:center;flex-shrink:0;font-size:.9rem}
.sb-badge{margin-left:auto;font-size:.62rem;font-weight:700;padding:2px 7px;border-radius:50px;background:var(--red);color:#fff}
.sb-foot{padding:14px;border-top:1px solid #1e293b}
.sb-admin{display:flex;align-items:center;gap:10px}
.sb-av{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--teal));display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:.8rem;flex-shrink:0}
.sb-admin-name{font-size:.8rem;font-weight:600;color:#fff}
.sb-admin-role{font-size:.66rem;color:#64748b}
.sb-signout{display:flex;align-items:center;gap:8px;padding:8px 12px;margin-top:8px;border-radius:8px;font-size:.78rem;color:#94a3b8;cursor:pointer;transition:var(--t)}
.sb-signout:hover{background:#1e293b;color:#fca5a5}
.main{display:flex;flex-direction:column;min-height:100vh}
.topbar{background:#fff;border-bottom:1px solid var(--gray-200);padding:14px 26px;display:flex;align-items:center;justify-content:space-between;gap:16px;position:sticky;top:0;z-index:50}
.tb-title{font-family:var(--font-d);font-size:1.25rem;font-weight:700;color:var(--gray-900)}
.tb-sub{font-size:.76rem;color:var(--gray-400);margin-top:2px}
.tb-right{display:flex;align-items:center;gap:14px}
.tb-search{position:relative}
.tb-search input{padding:8px 14px 8px 34px;border:1.5px solid var(--gray-200);border-radius:50px;font-size:.82rem;outline:none;width:220px;transition:var(--t)}
.tb-search input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,86,160,.08)}
.tb-search::before{content:'🔍';position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:.78rem}
.tb-icon-btn{width:36px;height:36px;border-radius:9px;border:1.5px solid var(--gray-200);background:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;transition:var(--t)}
.tb-icon-btn:hover{border-color:var(--blue);background:var(--blue-light)}
.tb-dot{position:absolute;top:6px;right:6px;width:8px;height:8px;background:var(--red);border-radius:50%;border:1.5px solid #fff}
.content{padding:24px 26px;flex:1}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:22px}
.stat-c{background:#fff;border:1.5px solid var(--gray-200);border-radius:var(--rl);padding:18px;position:relative;overflow:hidden;transition:var(--t)}
.stat-c:hover{border-color:var(--blue-mid);box-shadow:0 4px 16px rgba(26,86,160,.08);transform:translateY(-2px)}
.stat-ic{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:1.05rem;margin-bottom:10px}
.stat-c strong{display:block;font-family:var(--font-d);font-size:1.8rem;font-weight:700;color:var(--gray-900);line-height:1;margin-bottom:3px}
.stat-c span{font-size:.74rem;color:var(--gray-600)}
.stat-tag{position:absolute;top:14px;right:14px;font-size:.66rem;font-weight:700;padding:3px 8px;border-radius:50px}
.tt-g{background:#f0fdf4;color:var(--green)}.tt-b{background:var(--blue-light);color:var(--blue)}.tt-a{background:#fffbeb;color:#d97706}.tt-r{background:#fef2f2;color:var(--red)}.tt-gray{background:var(--gray-100);color:var(--gray-600)}
.ic1{background:var(--blue-light)}.ic2{background:#f0fdf4}.ic3{background:#fffbeb}.ic4{background:#f5f3ff}
.panel{background:#fff;border:1.5px solid var(--gray-200);border-radius:var(--rl);overflow:hidden;margin-bottom:20px}
.panel-hd{padding:14px 20px;border-bottom:1px solid var(--gray-100);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.panel-hd h3{font-family:var(--font-d);font-size:.98rem;font-weight:700;color:var(--gray-900)}
.panel-bd{padding:18px 20px}
.panel-link{font-size:.78rem;color:var(--blue);font-weight:600;cursor:pointer}
.panel-link:hover{text-decoration:underline}
.grid2{display:grid;grid-template-columns:1.6fr 1fr;gap:20px}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.82rem}
th{font-size:.66rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--gray-400);padding:9px 12px;text-align:left;background:var(--gray-50);border-bottom:1px solid var(--gray-200);white-space:nowrap}
td{padding:11px 12px;border-bottom:1px solid var(--gray-100);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafbff}
.cell-user{display:flex;align-items:center;gap:9px}
.cell-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:.68rem;font-weight:700;flex-shrink:0}
.cell-name{font-weight:700;color:var(--gray-900);font-size:.82rem}
.cell-sub{font-size:.7rem;color:var(--gray-400)}
.chip{font-size:.66rem;font-weight:700;padding:3px 9px;border-radius:50px;white-space:nowrap}
.ch-g{background:#f0fdf4;color:var(--green)}.ch-r{background:#fef2f2;color:var(--red)}.ch-a{background:#fffbeb;color:#d97706}.ch-b{background:var(--blue-light);color:var(--blue)}.ch-gray{background:var(--gray-100);color:var(--gray-600)}.ch-p{background:#f5f3ff;color:var(--purple)}
.btn{padding:7px 14px;border-radius:8px;font-size:.74rem;font-weight:600;cursor:pointer;border:1.5px solid var(--gray-200);background:#fff;color:var(--gray-600);transition:var(--t)}
.btn:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-light)}
.btn.primary{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn.primary:hover{background:var(--blue-dark)}
.btn.danger{background:#fef2f2;color:var(--red);border-color:#fecaca}
.btn.danger:hover{background:#fee2e2}
.btn.green{background:var(--green);color:#fff;border-color:var(--green)}
.btn.green:hover{background:#047857}
.btn-row{display:flex;gap:6px;flex-wrap:wrap}
.flt-row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px}
.flt{padding:6px 14px;border-radius:50px;border:1.5px solid var(--gray-200);font-size:.74rem;font-weight:600;cursor:pointer;background:#fff;color:var(--gray-600);transition:var(--t)}
.flt.on{background:var(--blue);border-color:var(--blue);color:#fff}
.flt:hover:not(.on){border-color:var(--blue-mid);color:var(--blue)}
.panel-search{position:relative;flex:1;max-width:280px}
.panel-search input{width:100%;padding:8px 12px 8px 32px;border:1.5px solid var(--gray-200);border-radius:8px;font-size:.8rem;outline:none}
.panel-search::before{content:'🔍';position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:.74rem}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.fg-item{display:flex;flex-direction:column;gap:5px}
.fg-item.full{grid-column:1/-1}
.fg-item label{font-size:.76rem;font-weight:600;color:var(--gray-700)}
.fg-item input,.fg-item select,.fg-item textarea{padding:9px 12px;border:1.5px solid var(--gray-200);border-radius:8px;font-size:.84rem;font-family:var(--font-b);outline:none;transition:var(--t)}
.fg-item input:focus,.fg-item select:focus,.fg-item textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,86,160,.08)}
.fg-item textarea{min-height:90px;resize:vertical;line-height:1.6}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--gray-100)}
.toggle-row:last-child{border-bottom:none}
.toggle-info strong{font-size:.84rem;color:var(--gray-900);display:block}
.toggle-info span{font-size:.74rem;color:var(--gray-400)}
.switch{position:relative;width:42px;height:23px;flex-shrink:0}
.switch input{opacity:0;width:0;height:0}
.slider{position:absolute;inset:0;background:var(--gray-300);border-radius:50px;cursor:pointer;transition:var(--t)}
.slider::before{content:'';position:absolute;width:17px;height:17px;left:3px;top:3px;background:#fff;border-radius:50%;transition:var(--t)}
.switch input:checked+.slider{background:var(--green)}
.switch input:checked+.slider::before{transform:translateX(19px)}
.pbar{height:6px;background:var(--gray-100);border-radius:3px;overflow:hidden;margin-top:6px}
.pbar-fill{height:100%;border-radius:3px}
.chart-bars{display:flex;align-items:flex-end;gap:6px;height:140px;margin-top:14px}
.cb-wrap{display:flex;flex-direction:column;align-items:center;flex:1;height:100%;justify-content:flex-end}
.cb-bar{width:100%;border-radius:5px 5px 0 0;background:linear-gradient(180deg,var(--blue-mid),var(--blue));transition:var(--t);position:relative}
.cb-bar:hover{opacity:.8}
.cb-label{font-size:.66rem;color:var(--gray-400);margin-top:6px}
.cb-val{font-size:.66rem;color:var(--gray-600);font-weight:700;margin-bottom:4px}
.kv-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.kv-card{background:var(--gray-50);border:1.5px solid var(--gray-200);border-radius:var(--r);padding:14px;text-align:center}
.kv-card strong{display:block;font-family:var(--font-d);font-size:1.4rem;color:var(--blue)}
.kv-card span{font-size:.72rem;color:var(--gray-500)}
.tpl-item{display:flex;align-items:center;padding:12px 0;border-bottom:1px solid var(--gray-100);gap:12px}
.tpl-item:last-child{border-bottom:none}
.tpl-ic{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0}
.tpl-info{flex:1}
.tpl-info strong{font-size:.84rem;color:var(--gray-900);display:block}
.tpl-info span{font-size:.72rem;color:var(--gray-400)}
.pager{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-top:1px solid var(--gray-100);font-size:.78rem;color:var(--gray-400)}
.pager-btns{display:flex;gap:5px}
.pager-btn{width:28px;height:28px;border-radius:7px;border:1.5px solid var(--gray-200);background:#fff;cursor:pointer;font-size:.74rem;display:flex;align-items:center;justify-content:center;transition:var(--t)}
.pager-btn.on{background:var(--blue);border-color:var(--blue);color:#fff}
.pager-btn:hover:not(.on){border-color:var(--blue-mid);color:var(--blue)}
.toast{position:fixed;bottom:20px;right:20px;background:var(--gray-900);color:#fff;padding:11px 20px;border-radius:10px;font-size:.84rem;font-weight:500;z-index:999;opacity:0;transform:translateY(8px);transition:all .3s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
.mob-toggle{display:none;background:none;border:none;font-size:1.3rem;cursor:pointer}

/* ===== ABOUT PAGE EDITORS (Partners + Founder) ===== */
/* Image upload widget */
.img-upload{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.img-thumb{width:72px;height:72px;border-radius:14px;border:1.5px solid var(--gray-200);background:var(--gray-50);display:flex;align-items:center;justify-content:center;font-size:2rem;overflow:hidden;flex-shrink:0}
.img-thumb img{width:100%;height:100%;object-fit:cover}
.img-thumb.round{border-radius:50%}
.img-thumb.lg{width:108px;height:108px;font-size:3rem}
.img-upload-actions{display:flex;flex-direction:column;gap:6px}
.upload-btn{display:inline-flex;align-items:center;gap:7px;padding:8px 14px;border-radius:8px;font-size:.76rem;font-weight:600;cursor:pointer;border:1.5px solid var(--gray-200);background:#fff;color:var(--gray-600);transition:var(--t)}
.upload-btn:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-light)}
.upload-hint{font-size:.68rem;color:var(--gray-400)}
.upload-btn input[type=file]{display:none}

/* Partner cards grid */
.partner-admin-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:14px}
.partner-admin-card{background:#fff;border:1.5px solid var(--gray-200);border-radius:var(--rl);padding:16px;display:flex;flex-direction:column;gap:10px;transition:var(--t);position:relative}
.partner-admin-card:hover{border-color:var(--blue-mid);box-shadow:0 4px 16px rgba(26,86,160,.08)}
.pac-top{display:flex;align-items:center;gap:12px}
.pac-img{width:54px;height:54px;border-radius:12px;background:var(--gray-50);border:1.5px solid var(--gray-200);display:flex;align-items:center;justify-content:center;font-size:1.7rem;overflow:hidden;flex-shrink:0}
.pac-img img{width:100%;height:100%;object-fit:cover}
.pac-meta{min-width:0}
.pac-name{font-size:.9rem;font-weight:700;color:var(--gray-900);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pac-tag{font-size:.74rem;color:var(--gray-500);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pac-link{font-size:.72rem;color:var(--blue);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pac-link:hover{text-decoration:underline}
.pac-actions{display:flex;gap:6px;margin-top:auto}
.pac-actions .btn{flex:1;text-align:center}
.empty-state{padding:36px 20px;text-align:center;color:var(--gray-400);font-size:.86rem}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(15,23,42,.55);backdrop-filter:blur(2px);z-index:500;display:flex;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto}
.modal-overlay.hidden{display:none}
.modal{background:#fff;border-radius:var(--rl);width:100%;max-width:540px;box-shadow:0 20px 60px rgba(0,0,0,.3);overflow:hidden;animation:modalIn .2s ease}
@keyframes modalIn{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}
.modal-hd{padding:16px 20px;border-bottom:1px solid var(--gray-100);display:flex;align-items:center;justify-content:space-between}
.modal-hd h3{font-family:var(--font-d);font-size:1rem;font-weight:700;color:var(--gray-900)}
.modal-close{background:none;border:none;font-size:1.2rem;cursor:pointer;color:var(--gray-400);width:30px;height:30px;border-radius:7px;transition:var(--t)}
.modal-close:hover{background:var(--gray-100);color:var(--gray-900)}
.modal-bd{padding:20px;display:flex;flex-direction:column;gap:14px}
.modal-ft{padding:14px 20px;border-top:1px solid var(--gray-100);display:flex;justify-content:flex-end;gap:8px}
.repeat-item{display:flex;align-items:center;gap:8px}
.repeat-item input{flex:1}
.icon-btn-sm{width:34px;height:34px;border-radius:8px;border:1.5px solid var(--gray-200);background:#fff;cursor:pointer;font-size:.85rem;flex-shrink:0;transition:var(--t)}
.icon-btn-sm:hover{border-color:var(--red);color:var(--red);background:#fef2f2}
.live-preview-note{font-size:.72rem;color:var(--gray-400);margin-top:4px}
/* — Configuration suite: standard control sizes — */
.di-code{width:100%;min-height:220px;padding:12px 14px;border:1.5px solid var(--gray-200);border-radius:8px;font-family:'Courier New',monospace;font-size:.8rem;line-height:1.55;background:var(--gray-50);resize:vertical;outline:none;transition:var(--t)}
.di-code:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,86,160,.08)}
.di-upload{border:2px dashed var(--gray-300);border-radius:10px;padding:22px 14px;min-height:150px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;text-align:center;cursor:pointer;background:var(--gray-50);transition:var(--t)}
.di-upload:hover{border-color:var(--blue);background:var(--blue-light)}
.di-upload img{max-height:90px;max-width:100%;border-radius:6px}
.fg-item select{width:100%}
/* ===== PUBLICATION REVIEW: full research-article preview (mirrors public research-article.html) ===== */
.rapv{background:#fff;border:1.5px solid var(--gray-200);border-radius:16px;padding:22px 24px}
.rapv-badges{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.rapv-badge{font-size:.66rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;padding:4px 11px;border-radius:50px}
.rab-type{background:#f3f0ff;color:var(--purple)}
.rab-area{background:var(--blue-light);color:var(--blue)}
.rab-open{background:#ecfdf5;color:var(--green)}
.rab-peer{background:#e0f7fa;color:var(--teal)}
.rapv h1{font-family:var(--font-d);font-size:1.55rem;font-weight:700;color:var(--gray-900);line-height:1.28;margin:0 0 12px}
.rapv-authors{font-size:.9rem;color:var(--gray-800);line-height:1.7;margin-bottom:6px}
.rapv-authors sup{color:var(--blue);font-weight:700;font-size:.7em}
.rapv-authors em{color:var(--blue);font-style:normal;font-weight:600}
.rapv-affil{font-size:.74rem;color:var(--gray-500);line-height:1.6;margin-bottom:14px}
.rapv-affil sup{color:var(--blue);font-weight:700}
.rapv-meta{display:flex;gap:10px 24px;flex-wrap:wrap;padding:12px 0;border-top:1px solid var(--gray-200);border-bottom:1px solid var(--gray-200);margin-bottom:14px}
.rapv-meta-item{font-size:.74rem;color:var(--gray-600)}
.rapv-meta-item b{display:block;font-size:.64rem;text-transform:uppercase;letter-spacing:.04em;color:var(--gray-400);margin-bottom:2px;font-weight:700}
.rapv-alt{display:flex;gap:20px;flex-wrap:wrap;margin-bottom:16px}
.rapv-alt .n{font-family:var(--font-d);font-size:1.2rem;font-weight:700;color:var(--blue);line-height:1}
.rapv-alt .l{font-size:.62rem;color:var(--gray-500);text-transform:uppercase;letter-spacing:.04em;margin-top:3px}
.rapv-abs{background:var(--gray-50);border:1.5px solid var(--gray-200);border-radius:14px;padding:16px 18px;margin-bottom:16px}
.rapv-abs-seg{margin-bottom:9px}.rapv-abs-seg:last-of-type{margin-bottom:0}
.rapv-abs-seg h5{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--blue);margin:0 0 2px}
.rapv-abs-seg p{font-size:.83rem;color:var(--gray-600);line-height:1.7;margin:0}
.rapv-kw{margin-top:12px;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.rapv-kw .lbl{font-size:.7rem;font-weight:700;color:var(--gray-500)}
.rapv-kw .kw{font-size:.7rem;font-weight:600;color:var(--blue);background:var(--blue-light);border-radius:50px;padding:3px 10px}
.rapv-sec{margin-bottom:16px;padding-left:14px;border-left:4px solid var(--blue-light)}
.rapv-sec.g{border-left-color:var(--green)}
.rapv-sec.r{border-left-color:var(--red)}
.rapv-sec.a{border-left-color:#d97706}
.rapv-sec.p{border-left-color:var(--purple)}
.rapv-sec.t{border-left-color:var(--teal)}
.rapv-sec>h4{font-family:var(--font-d);font-size:1.02rem;font-weight:700;color:var(--gray-900);margin:0 0 8px;padding-bottom:6px;border-bottom:1.5px solid var(--gray-100);display:flex;align-items:center;gap:8px}
.rapv-sn{background:var(--blue);color:#fff;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.64rem;font-weight:700;flex-shrink:0}
.rapv-sn.g{background:var(--green)}.rapv-sn.r{background:var(--red)}.rapv-sn.a{background:#d97706}.rapv-sn.p{background:var(--purple)}.rapv-sn.t{background:var(--teal)}
.rapv-sec p{font-size:.85rem;color:var(--gray-600);line-height:1.75;margin:0 0 8px}
.rapv-box{border-radius:10px;padding:11px 14px;margin:10px 0;border-left:4px solid}
.rapv-box h6{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin:0 0 5px}
.rapv-box ul{margin:0 0 0 15px;display:flex;flex-direction:column;gap:3px}
.rapv-box li,.rapv-box p{font-size:.8rem;line-height:1.6;margin:0}
.rapv-box.b{background:var(--blue-light);border-color:var(--blue)}.rapv-box.b h6,.rapv-box.b li,.rapv-box.b p{color:var(--blue-dark)}
.rapv-box.g{background:#ecfdf5;border-color:var(--green)}.rapv-box.g h6,.rapv-box.g li,.rapv-box.g p{color:#065f46}
.rapv-box.a{background:#fffbeb;border-color:#d97706}.rapv-box.a h6,.rapv-box.a li,.rapv-box.a p{color:#78350f}
.rapv-box.p{background:#f3f0ff;border-color:var(--purple)}.rapv-box.p h6,.rapv-box.p li,.rapv-box.p p{color:#4c1d95}
.rapv-box.t{background:#e0f7fa;border-color:var(--teal)}.rapv-box.t h6,.rapv-box.t li,.rapv-box.t p{color:#0e7490}
.rapv-figcap{font-size:.75rem;color:var(--gray-500);line-height:1.6;background:var(--gray-50);border:1px dashed var(--gray-200);border-radius:8px;padding:9px 12px;margin:8px 0}
.rapv-kf{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px}
.rapv-kf-card{border:1.5px solid var(--gray-200);border-radius:10px;padding:11px}
.rapv-kf-card .ico{font-size:1.3rem;display:block;margin-bottom:5px}
.rapv-kf-card b{display:block;font-size:.78rem;color:var(--gray-900);margin-bottom:2px}
.rapv-kf-card span{font-size:.72rem;color:var(--gray-600);line-height:1.45}
.rapv-refs{counter-reset:rref;list-style:none;padding:0;margin:6px 0 0}
.rapv-refs li{counter-increment:rref;position:relative;padding:8px 0 8px 30px;border-bottom:1px solid var(--gray-100);font-size:.78rem;color:var(--gray-600);line-height:1.6}
.rapv-refs li::before{content:counter(rref);position:absolute;left:0;top:8px;width:21px;height:21px;background:var(--blue-light);color:var(--blue);border-radius:6px;font-size:.68rem;font-weight:700;display:flex;align-items:center;justify-content:center}
.rapv-refs li:last-child{border-bottom:none}
.rapv-refs .doi{color:var(--blue);font-weight:600}
.rapv-cite{background:var(--gray-900);color:#e2e8f0;border-radius:10px;padding:12px 14px;font-family:ui-monospace,Menlo,monospace;font-size:.74rem;line-height:1.65;margin:8px 0;overflow-x:auto}
.rapv-cite em{color:#93c5fd;font-style:italic}
.rapv-fig{border:1.5px solid var(--gray-200);border-radius:10px;overflow:hidden;margin:10px 0}
.rapv-fig-plot{background:linear-gradient(135deg,#eef4fc,#e0f7fa);padding:18px 16px;display:flex;align-items:flex-end;gap:12px;height:150px}
.rapv-fig-bar{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;gap:6px}
.rapv-fig-bar .bar{width:100%;border-radius:6px 6px 0 0;background:linear-gradient(180deg,var(--blue),var(--blue-dark));position:relative;min-height:4px}
.rapv-fig-bar .v{position:absolute;top:-17px;left:0;right:0;text-align:center;font-size:.68rem;font-weight:700;color:var(--gray-700,#334155)}
.rapv-fig-bar .lbl{font-size:.66rem;color:var(--gray-600);text-align:center;font-weight:600;line-height:1.2}
.rapv-table{width:100%;border-collapse:collapse;font-size:.78rem;margin:10px 0;border:1px solid var(--gray-200);border-radius:8px;overflow:hidden}
.rapv-table th{background:var(--blue-dark);color:#fff;text-align:left;padding:7px 11px;font-size:.72rem;font-weight:600}
.rapv-table td{padding:7px 11px;border-bottom:1px solid var(--gray-100);color:var(--gray-600)}
.rapv-table tr:last-child td{border-bottom:none}
.rapv-table tr:nth-child(even) td{background:var(--gray-50)}
.rapv-tablewrap{overflow-x:auto}
/* review workspace layout */
.prw-grid{display:grid;grid-template-columns:1fr 340px;gap:18px;align-items:start}
.prw-controls{position:sticky;top:16px}
.prw-note{font-size:.72rem;color:var(--gray-500);background:var(--blue-light);border-radius:8px;padding:8px 11px;margin-bottom:12px;line-height:1.5}
.prw-check{display:flex;align-items:center;justify-content:space-between;gap:10px;font-size:.82rem;color:var(--gray-800);font-weight:500;padding:7px 0;border-bottom:1px solid var(--gray-100)}
@media(max-width:1024px){.prw-grid{grid-template-columns:1fr}.prw-controls{position:static}}
.rapv-read{font-size:.72rem;color:var(--gray-500);font-weight:600}
.aprv-cards{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:14px 0}
.aprv-card{background:var(--gray-50);border:1.5px solid var(--gray-200);border-radius:14px;padding:14px;display:flex;align-items:flex-start;gap:12px}
.aprv-av{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:.82rem;flex-shrink:0}
.aprv-label{font-size:.62rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--gray-400);margin-bottom:2px}
.aprv-name{font-size:.9rem;font-weight:700;color:var(--gray-900)}
.aprv-creds{font-size:.74rem;color:var(--blue);font-weight:600;margin-top:1px}
.aprv-role{font-size:.74rem;color:var(--gray-600);margin-top:2px}
.aprv-cert{display:inline-flex;align-items:center;gap:4px;font-size:.66rem;font-weight:600;background:#ecfdf5;color:var(--green);padding:2px 8px;border-radius:50px;margin-top:6px}

function goto(id){
  document.querySelectorAll('.sb-item').forEach(function(i){i.classList.toggle('active', i.dataset.id===id);});
  document.getElementById('pageTitle').textContent=pageMeta[id][0];
  document.getElementById('pageSub').textContent=pageMeta[id][1];
  document.getElementById('content').innerHTML = renderPage(id);
  document.getElementById('sidebar').classList.remove('open');
  window.scrollTo(0,0);
}

function statCards(arr){
  return '<div class="stats-row">'+arr.map(function(s){
    return '<div class="stat-c"><div class="stat-ic '+s.ic+'">'+s.icon+'</div><strong>'+s.num+'</strong><span>'+s.label+'</span><div class="stat-tag '+s.tagClass+'">'+s.tag+'</div></div>';
  }).join('')+'</div>';
}

function panelTable(title,actionsHtml,headers,rows,pagerInfo){
  var thead='<tr>'+headers.map(function(h){return '<th>'+h+'</th>';}).join('')+'</tr>';
  var tbody=rows.map(function(r){return '<tr>'+r.map(function(c,ci){return '<td data-label="'+rtLabel(headers[ci])+'">'+c+'</td>';}).join('')+'</tr>';}).join('');
  return '<div class="panel"><div class="panel-hd"><h3>'+title+'</h3><div class="btn-row">'+actionsHtml+'</div></div>'+
    '<div class="tbl-wrap"><table class="rtbl"><thead>'+thead+'</thead><tbody>'+tbody+'</tbody></table></div>'+
    (pagerInfo?'<div class="pager"><span>'+pagerInfo+'</span><div class="pager-btns"><div class="pager-btn">←</div><div class="pager-btn on">1</div><div class="pager-btn">2</div><div class="pager-btn">3</div><div class="pager-btn">→</div></div></div>':'')+
    '</div>';
}

/* strip tags/quotes from a header cell so it is safe as a data-label attribute */
function rtLabel(h){return String(h==null?'':h).replace(/<[^>]*>/g,'').replace(/"/g,'&quot;').trim();}

function filterRow(filters){
  return '<div class="flt-row">'+filters.map(function(f,i){return '<div class="flt'+(i===0?' on':'')+'" onclick="setFlt(this)">'+f+'</div>';}).join('')+'</div>';
}
function setFlt(el){
  Array.from(el.parentElement.children).forEach(function(f){f.classList.remove('on');});
  el.classList.add('on');
}

function ptStatusChip(s){
  var m={'Active':'ch-g','Suspended':'ch-r','Pending':'ch-a'};
  return '<span class="chip '+(m[s]||'ch-gray')+'">'+s+'</span>';
}
function ptChips(arr,cls){
  if(!arr||!arr.length)return '<span style="font-size:.78rem;color:var(--gray-400)">—</span>';
  return arr.map(function(x){return '<span class="chip '+cls+'" style="margin:0 4px 4px 0;display:inline-block">'+x+'</span>';}).join('');
}
function ptInfoCell(label,val){
  return '<div style="flex:1;min-width:150px;padding:12px 18px;border-right:1px solid var(--gray-100)">'+
    '<div style="font-size:.62rem;text-transform:uppercase;letter-spacing:.05em;color:var(--gray-400);font-weight:700">'+label+'</div>'+
    '<div style="font-size:.82rem;color:var(--gray-800);font-weight:600;margin-top:3px">'+val+'</div></div>';
}
function ptMedRow(label,val){
  return '<div style="display:flex;justify-content:space-between;gap:10px;padding:8px 0;border-bottom:1px solid var(--gray-100)">'+
    '<span style="font-size:.78rem;color:var(--gray-500)">'+label+'</span>'+
    '<span style="font-size:.8rem;color:var(--gray-900);font-weight:600;text-align:right">'+val+'</span></div>';
}

function physChip(st){

function physUnique(field){var s=[];PHYS_DB.forEach(function(r){if(s.indexOf(r[field])<0)s.push(r[field]);});return s.sort();}
function physSelect(label,field,options){
  var cur=PHYS_FLT[field];

    '<option'+(cur==='All'?' selected':'')+'>All</option>'+
    options.map(function(o){return '<option'+(o===cur?' selected':'')+'>'+o+'</option>';}).join('')+
    '</select></div>';
}
function physSet(field,val){ PHYS_FLT[field]=val; physRefresh(); }
function physRefresh(){
  var c=document.getElementById('content');
  if(c) c.innerHTML=pgPhysical(PHYS_FLT._navId);
}
function physFilteredList(){
  var q=(PHYS_FLT.patient||'').toLowerCase();
  return PHYS_DB.filter(function(r){
    if(PHYS_FLT.status!=='All'&&r.status!==PHYS_FLT.status) return false;
    if(PHYS_FLT.doctor!=='All'&&r.doctor!==PHYS_FLT.doctor) return false;
    if(PHYS_FLT.city!=='All'&&r.city!==PHYS_FLT.city) return false;
    if(PHYS_FLT.specialty!=='All'&&r.specialty!==PHYS_FLT.specialty) return false;
    if(q&&r.patient.toLowerCase().indexOf(q)<0) return false;
    return true;
  });
}
function pgPhysical(id){
  if(PHYS_FLT._navId!==id){
    PHYS_FLT._navId=id; PHYS_FLT.status=PHYS_STATUS_MAP[id]||'All';
    PHYS_FLT.doctor='All'; PHYS_FLT.city='All'; PHYS_FLT.specialty='All'; PHYS_FLT.patient='';
  }
  var counts={};['Pending','Approved','Rejected','Upcoming','Completed','Cancelled'].forEach(function(s){counts[s]=PHYS_DB.filter(function(r){return r.status===s;}).length;});
  var stats=statCards([
    {ic:'ic3',icon:'🕒',num:String(counts.Pending),label:'Pending Requests',tag:counts.Pending?'Action needed':'All clear',tagClass:counts.Pending?'tt-a':'tt-g'},
    {ic:'ic1',icon:'✅',num:String(counts.Approved),label:'Approved',tag:'Awaiting visit',tagClass:'tt-b'},
    {ic:'ic2',icon:'📅',num:String(counts.Upcoming),label:'Upcoming',tag:'Scheduled',tagClass:'tt-b'},

    '<button class="btn" onclick="physExport()">⬇ Export Report (CSV)</button></div></div>'+

    physSelect('Status','status',['Pending','Approved','Rejected','Upcoming','Completed','Cancelled'])+
    physSelect('Doctor','doctor',physUnique('doctor'))+
    physSelect('City','city',physUnique('city'))+
    physSelect('Specialty','specialty',physUnique('specialty'))+
    '<div class="fg-item" style="min-width:180px;flex:1"><label>Patient</label><input placeholder="Search patient name..." value="'+escAttr(PHYS_FLT.patient)+'" oninput="physSet(\'patient\',this.value)"></div>'+
    '</div></div>';
  var list=physFilteredList();
  var rows=list.map(function(r){
    var actions='<div class="btn-row"><button class="btn" onclick="showToast(\'Opening appointment '+r.id+'...\')">View</button>';
    if(r.status==='Pending'){
      actions+='<button class="btn green" onclick="physDecide(\''+r.id+'\',\'Approved\')">✓ Approve</button>'+
        '<button class="btn danger" onclick="physDecide(\''+r.id+'\',\'Rejected\')">✕ Reject</button>';
    } else if(r.status==='Approved'||r.status==='Upcoming'){
      actions+='<button class="btn danger" onclick="physDecide(\''+r.id+'\',\'Cancelled\')">Cancel</button>';
    }
    actions+='</div>';
    return [
      '<strong>'+r.id+'</strong>',
      r.patient,
      r.doctor+'<div style="font-size:.78rem;color:var(--gray-500)">'+r.specialty+'</div>',
      r.clinic+'<div style="font-size:.78rem;color:var(--gray-500)">'+r.city+'</div>',

function physDecide(id,newStatus){
  var r=PHYS_DB.find(function(x){return x.id===id;});
  if(!r) return;
  r.status=newStatus;
  var msg={'Approved':'✅ Appointment approved — patient & doctor notified','Rejected':'⛔ Appointment rejected — patient notified','Cancelled':'❌ Appointment cancelled — patient & doctor notified'};
  showToast(msg[newStatus]||'Status updated');
  physRefresh();
}
function physExport(){
  var list=physFilteredList();
  var head=['ID','Patient','Doctor','Specialty','City','Clinic','Date','Time','Status'];
  var lines=[head.join(',')].concat(list.map(function(r){
    return [r.id,r.patient,r.doctor,r.specialty,r.city,r.clinic,r.date,r.time,r.status].map(function(v){return '"'+String(v).replace(/"/g,'""')+'"';}).join(',');
  }));
  var a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(lines.join('\n'));
  a.download='physical-appointments-'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
  showToast('⬇ Appointment report exported');
}

function artSeoDefaults(a){
  a=a||{};
  var firstTag=(a.tags||'').split(',').map(function(s){return s.trim();}).filter(Boolean)[0]||(a.spec||'');
  var title=(a.title||'').replace(/\s+/g,' ').trim();
  var mt=title.length>60?title.slice(0,57).trim()+'…':title;
  var desc=(a.abstract||a.subtitle||'').replace(/\s+/g,' ').trim();
  if(desc.length>160)desc=desc.slice(0,157).trim()+'…';
  var secondary=(a.tags||'').split(',').map(function(s){return s.trim();}).filter(Boolean).filter(function(t){return t!==firstTag;}).join(', ');
  return {focus:firstTag,secondary:secondary,title:mt,desc:desc};
}

function artSlug(t){return String(t||'').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'').slice(0,50)||'article';}
function artSeoUrl(a){a=a||{};var u=(a.seoUrl||'').trim();return u||('https://www.drinsight.org/articles/'+artSlug(a.title));}
function seoUrlCrumb(u){u=String(u||'');var i=u.indexOf('://');if(i>=0)u=u.slice(i+3);while(u.slice(-1)==='/')u=u.slice(0,-1);return escHtmlPub(u.split('/').join(' › '));}

function artBuildSchema(a,ed){
  a=a||{};ed=ed||{};
  var def=artSeoDefaults(a);
  var kw=[];var f=(a.seoFocus||def.focus);if(f)kw.push(f);
  (a.seoSecondary||def.secondary||'').split(',').map(function(s){return s.trim();}).filter(Boolean).forEach(function(t){if(kw.indexOf(t)<0)kw.push(t);});
  (a.tags||'').split(',').map(function(s){return s.trim();}).filter(Boolean).forEach(function(t){if(kw.indexOf(t)<0)kw.push(t);});
  var obj={
    "@context":"https://schema.org",
    "@type":"MedicalWebPage",
    "headline":(a.metaTitle||def.title||a.title||''),
    "name":(a.title||''),
    "description":(a.metaDesc||def.desc||''),
    "url":artSeoUrl(a),
    "keywords":kw.join(', '),
    "inLanguage":"en"
  };
  if(a.audience)obj.audience={"@type":"MedicalAudience","audienceType":a.audience};
  if(a.spec)obj.about={"@type":"MedicalSpecialty","name":a.spec};
  if(a.author&&a.author.name)obj.author={"@type":"Person","name":a.author.name,"jobTitle":(a.author.creds||a.author.role||'')};
  if(ed.reviewer)obj.reviewedBy={"@type":"Person","name":ed.reviewer,"jobTitle":(ed.revCreds||'')};
  if(a.published)obj.datePublished=a.published;
  if(ed.reviewedDate)obj.dateModified=ed.reviewedDate;
  obj.publisher={"@type":"Organization","name":"The Dr Insight","url":"https://www.drinsight.org"};
  return JSON.stringify(obj,null,2);
}

  function pubTable(s){var rows=pubLines(s).map(function(r){return r.split('|').map(function(c){return c.trim();});});if(!rows.length)return '';var head=rows[0],body=rows.slice(1);return '<div class="rapv-tablewrap"><table class="rapv-table"><thead><tr>'+head.map(function(h){return '<th>'+escHtmlPub(h)+'</th>';}).join('')+'</tr></thead><tbody>'+body.map(function(r){return '<tr>'+r.map(function(c){return '<td>'+escHtmlPub(c)+'</td>';}).join('')+'</tr>';}).join('')+'</tbody></table></div>';}
  function pubFigure(s){var bars=pubLines(s).map(function(l){var p=l.split('|');return {lbl:(p[0]||'').trim(),val:(p[1]||'').trim()};}).filter(function(b){return b.lbl;});if(!bars.length)return '';var mx=1;bars.forEach(function(b){var n=Math.abs(parseFloat(b.val.replace(/[^0-9.\-]/g,'')))||0;if(n>mx)mx=n;});return '<div class="rapv-fig"><div class="rapv-fig-plot">'+bars.map(function(b){var n=Math.abs(parseFloat(b.val.replace(/[^0-9.\-]/g,'')))||0;var hgt=Math.max(6,Math.round(n/mx*90));return '<div class="rapv-fig-bar"><div class="bar" style="height:'+hgt+'%"><span class="v">'+escHtmlPub(b.val)+'</span></div><div class="lbl">'+escHtmlPub(b.lbl)+'</div></div>';}).join('')+'</div></div>';}

  var discInner=pubParas(d.discussion)+(pubLines(d.implications).length?box('p','🧭 Practice Implications',ul(pubLines(d.implications))):'');

function pubSeoDefaults(d){
  d=d||{};
  var firstKw=(d.keywords||'').split(',').map(function(s){return s.trim();}).filter(Boolean)[0]||(d.area||'');
  var title=(d.title||'').replace(/\s+/g,' ').trim();
  var mt=title.length>60?title.slice(0,57).trim()+'…':title;
  var desc=(d.absConcl||d.absBg||d.intro||'').replace(/\s+/g,' ').trim();
  if(desc.length>160)desc=desc.slice(0,157).trim()+'…';
  var secondary=(d.keywords||'').split(',').map(function(s){return s.trim();}).filter(Boolean).filter(function(t){return t!==firstKw;}).join(', ');
  return {focus:firstKw,secondary:secondary,title:mt,desc:desc};
}

function pubSlug(t){return String(t||'').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'').slice(0,50)||'publication';}
function pubSeoUrl(d){d=d||{};var u=(d.seoUrl||'').trim();return u||('https://www.drinsight.org/research/'+pubSlug(d.title));}

function pubBuildSchema(d,ed){
  d=d||{};ed=ed||{};
  var def=pubSeoDefaults(d);
  var kw=[];var f=(d.seoFocus||def.focus);if(f)kw.push(f);
  (d.seoSecondary||def.secondary||'').split(',').map(function(s){return s.trim();}).filter(Boolean).forEach(function(t){if(kw.indexOf(t)<0)kw.push(t);});
  (d.keywords||'').split(',').map(function(s){return s.trim();}).filter(Boolean).forEach(function(t){if(kw.indexOf(t)<0)kw.push(t);});
  var obj={
    "@context":"https://schema.org",
    "@type":"MedicalScholarlyArticle",
    "headline":(d.metaTitle||def.title||d.title||''),
    "name":(d.title||''),
    "description":(d.metaDesc||def.desc||''),
    "url":pubSeoUrl(d),
    "keywords":kw.join(', '),
    "inLanguage":"en"
  };
  var authors=(d.authors||[]).filter(function(a){return a&&a.name;}).map(function(a){var o={"@type":"Person","name":a.name};if(a.affil)o.affiliation={"@type":"Organization","name":a.affil};return o;});
  if(authors.length)obj.author=authors.length===1?authors[0]:authors;
  if(d.area)obj.about={"@type":"MedicalSpecialty","name":d.area};
  if(d.published)obj.datePublished=d.published;
  if(ed.reviewed)obj.dateModified=ed.reviewed;
  if(d.doi){obj.identifier={"@type":"PropertyValue","propertyID":"DOI","value":d.doi};obj.sameAs="https://doi.org/"+d.doi;}
  if(ed.reviewer)obj.reviewedBy={"@type":"Person","name":ed.reviewer};
  if(d.license)obj.license=d.license;
  obj.isAccessibleForFree=!!ed.open;
  obj.publisher={"@type":"Organization","name":"The Dr Insight","url":"https://www.drinsight.org"};
  return JSON.stringify(obj,null,2);
}

function pubSeoRefresh(){

  function ct(id,val,max){var e=document.getElementById(id);if(!e)return;var n=(val||'').length;e.textContent=n+'/'+max;e.style.color=n>max?'var(--red)':'var(--gray-400)';}
  ct('ce_metaTitleCt',mt?mt.value:'',60);ct('ce_metaDescCt',md?md.value:'',160);

/* ════════════════════════════════════════════════════════════════════
 *  DrInsight Admin — Configuration Suite

/* ── tiny store + activity log ── */
function dGet(k){ try{ return JSON.parse(localStorage.getItem('drinsight_admin_'+k)); }catch(e){ return null; } }
function dSet(k,v){ try{ localStorage.setItem('drinsight_admin_'+k, JSON.stringify(v)); }catch(e){} }
function dDb(k,def){ var v=dGet(k); return (v===null||v===undefined)?def:v; }
function dLog(m){ var l=dDb('activity',[]); l.unshift({m:m,ts:Date.now()}); if(l.length>60)l.length=60; dSet('activity',l); }
function dVal(id){ var e=document.getElementById(id); return e?e.value:''; }
function dAgo(ts){ var s=Math.floor((Date.now()-ts)/1000); if(s<60)return 'just now'; if(s<3600)return Math.floor(s/60)+' min ago'; if(s<86400)return Math.floor(s/3600)+' hr ago'; return Math.floor(s/86400)+' days ago'; }

/* ── DrInsight-styled form helpers ── */
function fgi(label,html,full){ return '<div class="fg-item'+(full?' full':'')+'"><label>'+label+'</label>'+html+'</div>'; }
function fIn(id,v,ph){ return '<input id="'+id+'" value="'+escAttr(v||'')+'" placeholder="'+escAttr(ph||'')+'">'; }
function fTa(id,v,ph,rows){ return '<textarea id="'+id+'" rows="'+(rows||3)+'" placeholder="'+escAttr(ph||'')+'">'+escText(v||'')+'</textarea>'; }
function fCode(id,v){ return '<textarea id="'+id+'" class="di-code">'+escText(v||'')+'</textarea>'; }
function dPanel(title,body,actions){ return '<div class="panel"><div class="panel-hd"><h3>'+title+'</h3><div class="btn-row">'+(actions||'')+'</div></div><div class="panel-bd">'+body+'</div></div>'; }
function dUpload(id,cur){
  return '<div class="di-upload" onclick="document.getElementById(\''+id+'_f\').click()">'+
    '<div style="font-size:1.8rem">🖼️</div><div style="font-size:.78rem;font-weight:600;color:var(--gray-600)">Click to upload an image</div>'+
    '<div style="font-size:.7rem;color:var(--gray-400)">PNG, JPG, WEBP · up to ~2 MB</div>'+
    '<input type="file" id="'+id+'_f" accept="image/*" style="display:none" onchange="onDIUpload(this,\''+id+'\')">'+
    '<img id="'+id+'_p" src="'+escAttr(cur||'')+'" style="'+(cur?'':'display:none')+'">'+
    '<input type="hidden" id="'+id+'" value="'+escAttr(cur||'')+'"></div>';
}
function onDIUpload(input,id){
  if(!input.files||!input.files[0])return;
  var r=new FileReader();
  r.onload=function(){
    document.getElementById(id).value=r.result;
    var p=document.getElementById(id+'_p'); p.src=r.result; p.style.display='';
    var m=dDb('media',[]); m.unshift(r.result); if(m.length>40)m.length=40; dSet('media',m);
  };
  r.readAsDataURL(input.files[0]);
}

function diSaveSeo(){ dSet('seo',{title:dVal('dseo-title'),desc:dVal('dseo-desc'),keywords:dVal('dseo-keywords'),suffix:dVal('dseo-suffix'),ogtitle:dVal('dseo-ogtitle'),ogdesc:dVal('dseo-ogdesc'),twitter:dVal('dseo-twitter'),ga:dVal('dseo-ga'),gsc:dVal('dseo-gsc'),schema:dVal('dseo-schema'),robots:dVal('dseo-robots'),sitemap:dVal('dseo-sitemap')}); dLog('Updated global SEO settings'); showToast('✅ Global SEO settings saved'); }
function diGenSitemap(){
  var base=(dDb('settings',{}).url||'https://www.drinsight.org').replace(/\/+$/,'');
  var today=new Date().toISOString().slice(0,10);
  var urls=DI_PAGES.map(function(p){
    var path=(p[0]==='home')?'/':'/'+p[0];
    var pr=(p[0]==='home')?'1.0':(p[0]==='blog'?'0.9':'0.7');
    return '  <url><loc>'+base+path+'</loc><lastmod>'+today+'</lastmod><changefreq>weekly</changefreq><priority>'+pr+'</priority></url>';
  });
  return '<?xml version="1.0" encoding="UTF-8"?>\n<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">\n'+urls.join('\n')+'\n</urlset>';
}
function diRegenSitemap(){ var e=document.getElementById('dseo-sitemap'); if(e){ e.value=diGenSitemap(); showToast('🔄 Sitemap regenerated — click Save to keep it'); } }
function diDownloadSitemap(){ var xml=dVal('dseo-sitemap')||diGenSitemap(); var a=document.createElement('a'); a.href='data:application/xml;charset=utf-8,'+encodeURIComponent(xml); a.download='sitemap.xml'; a.click(); dLog('Sitemap downloaded'); }
function diLoadPageSeo(){
  var sel=document.getElementById('dpseo-page'); if(!sel)return;
  var d=dDb('pageSeo',{})[sel.value]||{};
  ['title','desc','keywords','og','focus'].forEach(function(k){ var e=document.getElementById('dpseo-'+k); if(e)e.value=d[k]||''; });
  diRenderPageSeoList();
}
function diSavePageSeo(){
  var pid=dVal('dpseo-page'); var all=dDb('pageSeo',{});
  all[pid]={title:dVal('dpseo-title'),desc:dVal('dpseo-desc'),keywords:dVal('dpseo-keywords'),og:dVal('dpseo-og'),focus:dVal('dpseo-focus')};
  dSet('pageSeo',all); dLog('Updated SEO for page: '+pid); showToast('✅ Page SEO saved'); diRenderPageSeoList();
}
function diClearPageSeo(){ var pid=dVal('dpseo-page'); var all=dDb('pageSeo',{}); delete all[pid]; dSet('pageSeo',all); diLoadPageSeo(); showToast('Page SEO reset'); }
function diRenderPageSeoList(){
  var c=document.getElementById('dpseo-list'); if(!c)return;
  var all=dDb('pageSeo',{}); var keys=Object.keys(all);
  var lbl=function(id){ var f=DI_PAGES.filter(function(p){return p[0]===id;})[0]; return f?f[1]:id; };
  c.innerHTML = keys.length
    ? '<div style="font-size:.74rem;color:var(--gray-400);margin-bottom:6px">Pages with custom SEO ('+keys.length+'):</div>'+keys.map(function(k){return '<span class="chip ch-b" style="margin:0 6px 6px 0;display:inline-block">'+lbl(k)+'</span>';}).join('')
    : '<div style="font-size:.74rem;color:var(--gray-400)">No per-page SEO customised yet.</div>';
}

function docReadImage(ev){
  var f=ev.target.files&&ev.target.files[0]; if(!f)return;
  var r=new FileReader();
  r.onload=function(e){
    var img=new Image();
    img.onload=function(){
      var max=320, w=img.width, h=img.height, sc=Math.min(1,max/Math.max(w,h));
      var c=document.createElement('canvas'); c.width=Math.round(w*sc); c.height=Math.round(h*sc);
      c.getContext('2d').drawImage(img,0,0,c.width,c.height);
      DOC_SUBMISSIONS[DOC_CURRENT].image=c.toDataURL('image/jpeg',0.85);
      var w2=document.getElementById('docWorkspace'); if(w2) w2.innerHTML=docWorkspaceHtml(); if(DOC_EDIT_MODE) docSeoRefresh();
      showToast('🖼️ Photo added — click Save Doctor SEO to publish');
    };
    img.src=e.target.result;
  };
  r.readAsDataURL(f);
}

/* ---- SEO helpers (mirror artSeoDefaults / artSeoUrl / artBuildSchema / artSeoRefresh) ---- */
function docSeoDefaults(d){
  d=d||{};
  var exp=(d.expertise||'').split(',').map(function(s){return s.trim();}).filter(Boolean);
  var focus=exp[0]?(exp[0].toLowerCase()):((d.specName||'').toLowerCase()+' specialist');
  var secondary=exp.slice(1).join(', ');
  var name=(d.name||'').replace(/\s+/g,' ').trim();
  var mtRaw=name+' — '+(d.specName?('Consultant '+d.specName):'Medical Author')+' | DrInsight';
  var mt=mtRaw.length>60?mtRaw.slice(0,57).trim()+'…':mtRaw;
  var desc=(d.bioShort||d.title||'').replace(/\s+/g,' ').trim();
  if(desc.length>160)desc=desc.slice(0,157).trim()+'…';
  return {focus:focus,secondary:secondary,title:mt,desc:desc};
}
function docSlug(t){return String(t||'').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'').slice(0,50)||'doctor';}
function docSeoUrl(d){d=d||{};var u=(d.seoUrl||'').trim();return u||('https://www.drinsight.org/doctors/'+docSlug(d.name));}

function docBuildSchema(d){
  d=d||{};
  var def=docSeoDefaults(d);
  var kw=[];var f=(d.seoFocus||def.focus);if(f)kw.push(f);
  (d.seoSecondary||def.secondary||'').split(',').map(function(s){return s.trim();}).filter(Boolean).forEach(function(t){if(kw.indexOf(t)<0)kw.push(t);});
  (d.expertise||'').split(',').map(function(s){return s.trim();}).filter(Boolean).forEach(function(t){if(kw.indexOf(t)<0)kw.push(t);});
  var url=docSeoUrl(d);
  var alumni=(d.education||'').split('\n').map(function(s){return s.trim();}).filter(Boolean).map(function(line){
    var name=line.split(/—|·/)[1]?line.split(/—|·/)[1].trim():line; return {"@type":"EducationalOrganization","name":name};
  });
  var obj={
    "@context":"https://schema.org",
    "@type":"Physician",
    "@id":url+"#physician",
    "name":d.name||'',
    "url":url,
    "description":(d.metaDesc||def.desc||d.bioShort||''),
    "medicalSpecialty":d.specName||'',
    "knowsAbout":kw,
    "knowsLanguage":(d.languages||'').split(',').map(function(s){return s.trim();}).filter(Boolean),
    "worksFor":{"@type":"MedicalOrganization","name":d.institution||''},
    "memberOf":{"@type":"MedicalOrganization","name":"The Dr Insight","url":"https://www.drinsight.org/"}
  };
  if(alumni.length)obj.alumniOf=alumni;
  var same=[d.facebook,d.twitter,d.youtube,d.instagram,d.linkedin].map(function(x){return (x||'').trim();}).filter(Boolean);
  if(same.length)obj.sameAs=same;
  if(d.stats&&d.stats.rating)obj.aggregateRating={"@type":"AggregateRating","ratingValue":d.stats.rating,"reviewCount":String((d.stats.reviews||'0')).replace(/[^0-9]/g,'')||'0',"bestRating":"5"};
  return JSON.stringify(obj,null,2);
}

/* ── SMS OTP sender (Textbelt or custom gateway) ── */
function diSendSmsOtp(phone, code, purpose, cb){
  var st=dDb('settings',{});
  var msg=(st.smsName||'DrInsight')+' code: '+code+' — valid 10 minutes. ('+(purpose||'verification')+')';
  var isCustom=(st.smsProv==='custom' && st.smsUrl);
  var url=isCustom?st.smsUrl:'https://textbelt.com/text';
  var body=isCustom?{phone:phone,message:msg}:{phone:phone,message:msg,key:st.smsKey||'textbelt'};
  fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)})
    .then(function(r){return r.json().catch(function(){return {};});})
    .then(function(d){ if(d.success||d.ok){ cb(true,'✅ SMS code sent to '+phone); } else { cb(false,'⚠️ SMS failed: '+(d.error||'check your key / quota')); } })
    .catch(function(){ cb(false,'⚠️ SMS service unreachable'); });
}
function diTestSmsOtp(){
  diSaveSettings();
  var phone=dVal('ds-smstest').trim();
  if(!/^\+?[0-9 ()-]{7,18}$/.test(phone)){ showToast('⚠️ Enter a valid test cell number'); return; }
  var code=(''+Math.floor(100000+Math.random()*900000));
  var stEl=document.getElementById('ds-sms-status'); if(stEl)stEl.textContent='Sending…';
  diSendSmsOtp(phone, code, 'test', function(ok,msg){
    if(stEl){ stEl.textContent=msg; stEl.style.color=ok?'var(--green)':'var(--red)'; }
    showToast(msg); dLog('Test SMS OTP '+(ok?'sent to ':'failed for ')+phone);
  });
}

function diExportBackup(){
  var keys=['seo','pageSeo','pageHero','branding','media','menus','contactinfo','subs','ads','settings','twofa','activity','faqs','cats','tags'];
  var data={}; keys.forEach(function(k){ var v=dGet(k); if(v!==null)data[k]=v; });
  var a=document.createElement('a'); a.href='data:application/json;charset=utf-8,'+encodeURIComponent(JSON.stringify(data,null,2)); a.download='drinsight-backup-'+new Date().toISOString().slice(0,10)+'.json'; a.click();
  dLog('Backup exported'); showToast('✅ Backup downloaded');
}
function diRestoreBackup(input){
  if(!input.files||!input.files[0])return;
  var r=new FileReader();
  r.onload=function(){ try{ var d=JSON.parse(r.result); Object.keys(d).forEach(function(k){dSet(k,d[k]);}); dLog('Backup restored'); showToast('✅ Backup restored'); goto('backup-security'); }catch(e){ showToast('⚠️ Invalid backup file'); } };
  r.readAsText(input.files[0]);
}
function diChangeCred(){
  var u=dVal('dcr-user').trim(),n=dVal('dcr-new'),c=dVal('dcr-conf');
  if(!u){showToast('⚠️ Username required');return;}
  if(n&&n.length<8){showToast('⚠️ Password must be at least 8 characters');return;}
  if(n!==c){showToast('⚠️ Passwords do not match');return;}
  var cur=dDb('cred',{});
  dSet('cred',{user:u,pass:n||cur.pass||''});
  dLog('Panel credentials updated'); showToast('✅ Credentials updated');
}

<!-- ==== DRINSIGHT RESPONSIVE HARDENING (mobile-friendly overflow fixes) ==== -->
<style id="drinsight-responsive-fix">
/* Global: never let the page scroll sideways; media stays inside its box */
html,body{max-width:100%;overflow-x:hidden}
*{min-width:0}                 /* let grid/flex items shrink instead of forcing page-wide overflow */
img,svg,video,iframe,canvas,object,embed,picture{max-width:100%;height:auto}
table{max-width:100%}
pre,code{white-space:pre-wrap;word-break:break-word;overflow-wrap:anywhere}
/* long words, emails, urls wrap instead of pushing the layout wide */
p,li,td,th,a,h1,h2,h3,h4,h5,h6,span,label,blockquote,figcaption,.prose{overflow-wrap:break-word}

@media(max-width:900px){
  /* content + sidebar layouts collapse to one column */
  .article-layout,.main,.two-col,.blog-layout,.page-layout,.layout,
  .content-wrap,.doc-layout,.split,.with-sidebar,.body-grid{
    grid-template-columns:1fr !important;
  }
  /* wide sidebars stop reserving a fixed track */
  .sidebar,.toc-sidebar,.aside,.side{max-width:100% !important}
}

@media(max-width:768px){
  /* flex button/pill rows wrap onto new lines */
  .action-btns,.hero-actions,.btn-row,.btn-group,.cta-row,.pill-row,
  .tags,.chips,.expertise,.expertise-list,.badges{flex-wrap:wrap}
  /* fallback: any table NOT converted to cards still scrolls instead of breaking layout */
  table:not(.rtbl){display:block;width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch}
}

@media(max-width:600px){
  /* multi-column card / stat grids drop to a single column on phones */
  [class$="-grid"],[class*="-grid "],
  .card-grid-2,.card-grid-3,.card-grid-4,
  .stats-row,.stats-bar-inner,.trust-row,.trust-inner,
  .apply-steps-row,.kv-grid,.fg,.role-grid,.cred-grid,.cat-tiles,.cats-grid,
  .collection-grid,.legal-grid,.rights-grid,.security-grid,.contact-grid,
  .cert-grid,.articles-grid,.auth-grid,.partner-admin-grid,.spec-grid,
  .related-grid,.blog-grid{
    grid-template-columns:1fr !important;
  }
  /* 7-day calendars stay compact but never overflow */
  .cal-grid{grid-template-columns:repeat(7,1fr) !important;font-size:.62rem !important}
  /* horizontal step indicators wrap instead of overflowing */
  .steps,.progress-steps,.step-row,.apply-steps-row{flex-wrap:wrap}
}

/* ==== RESPONSIVE DATA TABLES: no more sideways sliding on phones ====
   Tables with a header row become stacked "cards" — each row is a card and
   every value shows its column label. Fits every screen with zero scrolling. */
@media(max-width:680px){
  table.rtbl{display:block;width:100% !important;border:none !important;background:none !important;overflow:visible !important}
  table.rtbl thead{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap;border:0}
  table.rtbl tbody{display:block;width:100%}
  table.rtbl tr{
    display:block;width:100%;margin:0 0 14px;
    border:1px solid var(--gray-200,#e2e8f0);border-radius:12px;
    background:#fff;box-shadow:0 1px 4px rgba(15,23,42,.06);overflow:hidden
  }
  table.rtbl tr:nth-child(even){background:#fff}
  table.rtbl td{
    display:flex;justify-content:space-between;align-items:baseline;gap:14px;
    width:auto !important;padding:10px 14px;border:none;border-bottom:1px solid #eef2f7;
    text-align:right;font-size:.9rem;white-space:normal !important
  }
  table.rtbl td:first-child{background:var(--blue-light,#e8f0fb);font-weight:700}
  table.rtbl td:last-child{border-bottom:none}
  table.rtbl td::before{
    content:attr(data-label);font-weight:600;color:#475569;
    text-align:left;flex:0 0 40%;min-width:0;overflow-wrap:break-word
  }
  table.rtbl td:not([data-label])::before{display:none}
  table.rtbl td:not([data-label]){justify-content:flex-start;text-align:left}
  /* the old scroll wrappers no longer need to scroll — cards already fit */
  .data-table-wrap,.table-wrap,.tbl-wrap,.table-scroll{overflow:visible !important;border:none !important}
}
</style>
<script>
/* Label each table cell with its column header so CSS can show them as cards on phones. */
(function(){
  function labelTables(){
    var tables = document.querySelectorAll('table');
    for (var t=0; t<tables.length; t++){
      var tbl = tables[t];
      if (tbl.getAttribute('data-rtbl')) continue;
      // find header labels
      var head = tbl.querySelector('thead tr');
      var headerCells, hideFirstRow = false;
      if (head){ headerCells = head.querySelectorAll('th,td'); }
      else {
        var firstRow = tbl.querySelector('tr');
        if (!firstRow) continue;
        headerCells = firstRow.querySelectorAll('th');
        if (!headerCells.length) continue;   // no real headers -> leave it scrollable
        hideFirstRow = true;
      }
      var labels = [];
      for (var i=0;i<headerCells.length;i++){ labels.push(headerCells[i].textContent.trim()); }
      if (!labels.length) continue;
      var rows = tbl.querySelectorAll('tbody tr');
      if (!rows.length) rows = tbl.querySelectorAll('tr');
      for (var r=0;r<rows.length;r++){
        if (hideFirstRow && r===0) continue;
        var cells = rows[r].querySelectorAll('td');
        for (var c=0;c<cells.length;c++){
          if (labels[c] && !cells[c].hasAttribute('data-label')){
            cells[c].setAttribute('data-label', labels[c]);
          }
        }
      }
      tbl.classList.add('rtbl');
      tbl.setAttribute('data-rtbl','1');
    }
  }
  if (document.readyState !== 'loading') labelTables();
  else document.addEventListener('DOMContentLoaded', labelTables);
})();
</script>

.rx-advice{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.rx-adv{border:1px solid var(--rx-line);border-radius:9px;padding:10px 13px;background:#fff;}
.rx-adv.warn{background:#fff8f5;border-color:#fecaca;}
.rx-adv h5{font-size:.68rem;font-weight:800;letter-spacing:.4px;text-transform:uppercase;color:var(--rx-blue-d);margin:0 0 5px;display:flex;align-items:center;gap:6px;}
.rx-adv.warn h5{color:var(--rx-red);}
.rx-adv p{font-size:.76rem;color:#33465c;margin:0;line-height:1.55;}

/* followup strip */
.rx-follow{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--rx-line-2);border:1px solid var(--rx-line-2);border-radius:9px;overflow:hidden;}
.rx-follow .rx-cell{background:linear-gradient(180deg,#f4fbf7,#fff);}

/* doctor private note */
.rx-privnote{background:#fffbeb;border:1px dashed #fcd34d;border-radius:9px;padding:11px 14px;font-size:.78rem;color:#78350f;line-height:1.55;}
.rx-privnote .rx-privlabel{font-size:.6rem;font-weight:800;letter-spacing:.6px;text-transform:uppercase;color:#b45309;margin-bottom:4px;display:flex;align-items:center;gap:6px;}

/* signature + footer */
.rx-signrow{display:flex;justify-content:space-between;align-items:flex-end;margin-top:26px;gap:20px;}
.rx-sign{text-align:center;min-width:210px;}
.rx-sign .rx-sig-mark{font-family:'Segoe Script','Brush Script MT',cursive;font-size:1.7rem;color:var(--rx-blue-d);line-height:1;margin-bottom:3px;transform:rotate(-3deg);}
.rx-sign .rx-sig-line{border-top:1.5px solid var(--rx-ink);padding-top:5px;}
.rx-sign .rx-sig-name{font-weight:700;font-size:.82rem;color:var(--rx-ink);}
.rx-sign .rx-sig-sub{font-size:.66rem;color:var(--rx-muted);}
.rx-esign{display:inline-flex;align-items:center;gap:6px;margin-top:6px;font-size:.62rem;font-weight:700;color:var(--rx-green);
  background:#ecfdf5;border:1px solid #a7f3d0;padding:3px 9px;border-radius:50px;}
.rx-stampbox{text-align:right;}
.rx-stamp{display:inline-block;border:2px solid var(--rx-green);color:var(--rx-green);border-radius:10px;padding:8px 16px;
  transform:rotate(-6deg);font-weight:800;letter-spacing:1px;font-size:.82rem;text-transform:uppercase;opacity:.9;}
.rx-stamp.pending{border-color:var(--rx-amber);color:var(--rx-amber);}
.rx-stamp.dismissed{border-color:var(--rx-red);color:var(--rx-red);}
.rx-stamp small{display:block;font-size:.54rem;font-weight:700;letter-spacing:.4px;opacity:.85;margin-top:1px;}

.rx-ft{margin-top:22px;border-top:2px solid var(--rx-blue);padding-top:12px;}
.rx-ft-grid{display:flex;flex-wrap:wrap;gap:6px 20px;font-size:.68rem;color:var(--rx-muted);}
.rx-ft-grid span{display:inline-flex;align-items:center;gap:5px;}
.rx-ft-grid b{color:var(--rx-ink);font-weight:600;}
.rx-disc{margin-top:9px;background:var(--rx-wash);border:1px solid var(--rx-line);border-radius:8px;padding:9px 13px;
  font-size:.66rem;color:var(--rx-muted);line-height:1.55;font-style:italic;}
.rx-copyr{margin-top:8px;text-align:center;font-size:.62rem;color:var(--rx-muted-2);}
.rx-pagefoot{display:none;}

/* audit trail (admin) */
.rx-audit{margin-top:14px;border:1px solid var(--rx-line);border-radius:9px;overflow:hidden;}
.rx-audit .rx-audit-hd{background:var(--rx-wash-2);padding:7px 13px;font-size:.62rem;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:var(--rx-blue-d);}
.rx-audit-row{display:flex;gap:10px;padding:8px 13px;border-top:1px solid var(--rx-line-2);font-size:.72rem;align-items:baseline;}
.rx-audit-row .t{color:var(--rx-muted-2);white-space:nowrap;min-width:118px;font-variant-numeric:tabular-nums;}
.rx-audit-row .w{font-weight:700;color:var(--rx-ink);min-width:120px;}
.rx-audit-row .a{color:var(--rx-muted);}

/* ---------- Doctor builder (full screen) ---------- */
#rxBuild{position:fixed;inset:0;z-index:3800;background:#eef3f9;display:none;overflow-y:auto;}
#rxBuild.open{display:block;}
.rxb-bar{position:sticky;top:0;z-index:6;display:flex;align-items:center;gap:10px;flex-wrap:wrap;
  padding:12px 20px;background:linear-gradient(135deg,#0f3d7a,#1a56a0);color:#fff;box-shadow:0 3px 16px rgba(0,0,0,.18);}
.rxb-bar .rxb-ttl{font-family:var(--rx-serif);font-weight:700;font-size:1.02rem;margin-right:auto;display:flex;align-items:center;gap:10px;}
.rxb-bar .rxb-ttl small{font-family:var(--rx-sans);font-weight:500;font-size:.72rem;color:#bcd6ef;}
.rxb-save{font-size:.68rem;color:#bfe3ff;display:flex;align-items:center;gap:6px;margin-right:6px;}
.rxb-dot{width:7px;height:7px;border-radius:50%;background:#4ade80;box-shadow:0 0 0 3px rgba(74,222,128,.25);}
.rxb-wrap{max-width:900px;margin:0 auto;padding:20px 16px 90px;}
.rxb-card{background:#fff;border:1px solid #e3ecf5;border-radius:14px;padding:16px 18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(15,43,76,.04);}
.rxb-card>.rxb-h{display:flex;align-items:center;gap:9px;margin:-2px 0 13px;}
.rxb-card>.rxb-h .ic{width:30px;height:30px;border-radius:8px;background:var(--rx-wash-2);color:var(--rx-blue);display:flex;align-items:center;justify-content:center;font-size:.95rem;}
.rxb-card>.rxb-h h4{font-family:var(--rx-sans);font-size:.9rem;font-weight:800;color:var(--rx-blue-d);margin:0;letter-spacing:.3px;}
.rxb-card>.rxb-h .rxb-auto{margin-left:auto;font-size:.62rem;font-weight:700;color:var(--rx-green);background:#ecfdf5;border:1px solid #a7f3d0;padding:3px 9px;border-radius:50px;letter-spacing:.3px;text-transform:uppercase;}
.rxb-card>.rxb-h .rxb-edit{margin-left:auto;font-size:.68rem;font-weight:700;color:var(--rx-blue);background:none;border:1px solid var(--rx-line);padding:4px 11px;border-radius:7px;cursor:pointer;}
.rxb-card>.rxb-h .rxb-edit:hover{background:var(--rx-wash);}
.rxb-fg{display:grid;grid-template-columns:repeat(2,1fr);gap:11px;}
.rxb-fg.g1{grid-template-columns:1fr;} .rxb-fg.g3{grid-template-columns:repeat(3,1fr);}
.rxb-f{display:flex;flex-direction:column;gap:4px;} .rxb-f.full{grid-column:1/-1;}
.rxb-f label{font-size:.66rem;font-weight:700;color:var(--rx-muted);letter-spacing:.3px;text-transform:uppercase;}
.rxb-f input,.rxb-f textarea,.rxb-f select{font-family:var(--rx-sans);font-size:.84rem;color:var(--rx-ink);
  border:1.5px solid #dbe6f2;border-radius:9px;padding:9px 11px;background:#fff;transition:.15s;width:100%;}
.rxb-f input:focus,.rxb-f textarea:focus,.rxb-f select:focus{outline:none;border-color:var(--rx-blue);box-shadow:0 0 0 3px rgba(26,86,160,.1);}
.rxb-f textarea{resize:vertical;min-height:60px;line-height:1.5;}
.rxb-f input[readonly]{background:#f4f8fd;color:var(--rx-muted);cursor:default;}
.rxb-chips{display:flex;flex-wrap:wrap;gap:7px;}
.rxb-chip{font-size:.76rem;font-weight:600;padding:6px 13px;border-radius:8px;border:1.5px solid #dbe6f2;background:#fff;color:var(--rx-muted);cursor:pointer;transition:.15s;user-select:none;}
.rxb-chip:hover{border-color:var(--rx-blue);color:var(--rx-blue);}
.rxb-chip.on{background:var(--rx-blue);border-color:var(--rx-blue);color:#fff;}
.rxb-chip.inv.on{background:var(--rx-amber);border-color:var(--rx-amber);}
.rxb-hint{font-size:.68rem;color:var(--rx-muted-2);margin-top:2px;}
/* medicine builder rows */
.rxb-med{border:1.5px solid #e3ecf5;border-radius:11px;padding:12px;margin-bottom:10px;position:relative;background:linear-gradient(180deg,#fbfdff,#fff);}
.rxb-med .rxb-mno{position:absolute;top:-9px;left:12px;width:22px;height:22px;border-radius:50%;background:var(--rx-blue);color:#fff;font-size:.72rem;font-weight:700;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(26,86,160,.3);}
.rxb-med .rxb-mdel{position:absolute;top:8px;right:8px;width:26px;height:26px;border:none;border-radius:7px;background:#fef2f2;color:var(--rx-red);cursor:pointer;font-size:.8rem;}
.rxb-med .rxb-mdel:hover{background:#fee2e2;}
.rxb-med-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-top:6px;}
.rxb-addmed{display:inline-flex;align-items:center;gap:7px;background:var(--rx-wash-2);color:var(--rx-blue);border:1.5px dashed #9dc0e6;
  padding:9px 15px;border-radius:9px;font-weight:700;font-size:.8rem;cursor:pointer;transition:.15s;}
.rxb-addmed:hover{background:#e0edfa;}
.rxb-tools{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;}
.rxb-tool{font-size:.74rem;font-weight:600;color:var(--rx-blue-d);background:#fff;border:1.5px solid #dbe6f2;border-radius:8px;padding:7px 12px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:.15s;}
.rxb-tool:hover{border-color:var(--rx-blue);background:var(--rx-wash);}
.rxb-footer{position:fixed;bottom:0;left:0;right:0;z-index:7;background:#fff;border-top:1px solid #e3ecf5;
  box-shadow:0 -3px 16px rgba(15,43,76,.07);padding:11px 20px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
.rxb-footer .rxb-status{font-size:.72rem;color:var(--rx-muted);margin-right:auto;display:flex;align-items:center;gap:7px;}
.rxb-btn{border:none;cursor:pointer;font-family:var(--rx-sans);font-weight:700;font-size:.82rem;padding:11px 18px;border-radius:10px;display:inline-flex;align-items:center;gap:7px;transition:.15s;}
.rxb-btn.out{background:#fff;border:1.5px solid #dbe6f2;color:var(--rx-blue-d);} .rxb-btn.out:hover{background:var(--rx-wash);}
.rxb-btn.blue{background:var(--rx-blue);color:#fff;} .rxb-btn.blue:hover{background:var(--rx-blue-d);}
.rxb-btn.green{background:var(--rx-green);color:#fff;} .rxb-btn.green:hover{filter:brightness(1.08);}

/* status chips reused */
.rx-schip{display:inline-flex;align-items:center;gap:5px;font-size:.68rem;font-weight:700;padding:3px 10px;border-radius:50px;letter-spacing:.2px;}
.rx-schip.pend{background:#fffbeb;color:#b45309;border:1px solid #fcd34d;}
.rx-schip.appr{background:#ecfdf5;color:#047857;border:1px solid #a7f3d0;}
.rx-schip.dism{background:#fef2f2;color:#b91c1c;border:1px solid #fecaca;}
.rx-schip.draft{background:#f1f5f9;color:#475569;border:1px solid #cbd5e1;}
.rx-schip.final{background:#eef5fc;color:#1a56a0;border:1px solid #bcd6ef;}

@media (max-width:820px){
  .rx-idband{grid-template-columns:1fr;} .rx-idcol+.rx-idcol{border-left:none;border-top:1px solid var(--rx-line);}
  .rx-grid,.rx-grid.g3{grid-template-columns:repeat(2,1fr);}
  .rx-advice{grid-template-columns:1fr;} .rx-follow{grid-template-columns:1fr;}
  .rxb-fg,.rxb-fg.g3,.rxb-med-grid{grid-template-columns:1fr;}
  .rx-hd,.rx-body{padding-left:14px;padding-right:14px;}
  .rx-hd{padding-top:18px;} .rx-mtable{font-size:.72rem;}
  .rx-hd-top{flex-wrap:wrap;} .rx-hd-right{align-items:flex-start;text-align:left;}
}
@media (max-width:560px){
  .rx-mtable thead{display:none;}
  .rx-mtable tbody td{display:block;border:none;padding:3px 12px;}
  .rx-mtable tbody tr{display:block;border:1px solid var(--rx-line-2);border-radius:9px;margin:8px 10px;padding:8px 0;}
  .rx-vw-title .rx-vw-no{display:none;}
}

/* ================= PRINT — clean A4, no UI ================= */
@media print{
  @page{size:A4;margin:0;}
  html,body{background:#fff!important;margin:0!important;padding:0!important;}
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;}
  body *{visibility:hidden!important;}
  #rxViewer,#rxViewer *{visibility:visible!important;}
  #rxViewer{position:absolute!important;left:0!important;top:0!important;right:0!important;bottom:auto!important;width:100%!important;background:#fff!important;padding:0!important;margin:0!important;backdrop-filter:none!important;display:block!important;overflow:visible!important;}
  .rx-vw-bar{display:none!important;}
  .rx-vw-scroll{padding:0!important;margin:0!important;}
  .rx-doc{box-shadow:none!important;border-radius:0!important;width:100%!important;max-width:100%!important;margin:0!important;min-height:auto!important;}
  /* keep coloured sections and rows intact across page breaks */
  .rx-idband,.rx-grid,.rx-scriptwrap,.rx-adv,.rx-follow,.rx-block,.rx-privnote,.rx-sec,.rx-signrow,.rx-mtable tr{break-inside:avoid;page-break-inside:avoid;}
  .rx-audit{display:none!important;}
  .rx-pagefoot{display:block!important;position:fixed;bottom:6mm;left:0;right:0;text-align:center;font-size:.58rem;color:#8296ac;visibility:visible!important;}
}
</style>

var BRAND={name:'DrInsight',tagline:'Online Medical Consultation',website:'www.drinsight.org',
