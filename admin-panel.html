/* ---------- record factory: fills EVERY spec field with defaults ---------- */
function mkRx(o){
  o=o||{};
  var base={
    rxNo:o.rxNo||('DRX-2026-'+Math.floor(100000+Math.random()*899999)),
    verifyId:o.verifyId||('VF-'+Math.random().toString(36).slice(2,10).toUpperCase()),
    issuedAt:o.issuedAt||stamp(),
    status:o.status||'Finalized',            // Draft|Finalized|Pending Review|Approved|Dismissed
    consult:Object.assign({consultId:'—',apptId:'—',doctorId:'—',patientId:'—',dateTime:'—',status:'Completed',type:'Video',followupRef:'—'},o.consult),
    doctor:Object.assign({name:'—',qualification:'—',specialization:'—',reg:'—',initials:'Dr',avBg:'#1a56a0,#0891b2',signature:''},o.doctor),
    patient:Object.assign({name:'—',id:'—',age:'—',gender:'—',dob:'—',height:'—',weight:'—',bmi:'—',blood:'—',phone:'—',email:'—',city:'—',country:'—',allergies:'None reported',chronic:'None reported',currentMeds:'None',emergency:'—'},o.patient),
    summary:Object.assign({reason:'',chiefComplaint:'',notes:'',symptomDuration:'',prevTreatment:'',prevConsultRef:'',reports:[]},o.summary),
    symptoms:Object.assign({reported:[],duration:'',severity:'',frequency:'',progression:'',associated:'',aggravating:'',relieving:''},o.symptoms),
    exam:Object.assign({appearance:'',alertness:'',speech:'',respiratory:'',swelling:'',skin:'',temp:'',bp:'',sugar:'',spo2:'',hr:'',other:'',observations:''},o.exam),
    assessment:Object.assign({provisional:'',differential:'',icd10:'',impression:'',risk:''},o.assessment),
    investigations:o.investigations||[],
    meds:o.meds||[],
    advice:Object.assign({diet:'',lifestyle:'',exercise:'',hydration:'',sleep:'',homeCare:'',isolation:'',warning:'',emergency:''},o.advice),
    followup:Object.assign({required:'',date:'',after:'',type:'',referral:'',referralNotes:''},o.followup),
    doctorNotes:Object.assign({text:'',includeInPatient:false},o.doctorNotes),
    audit:o.audit||[]
  };
  return base;
}
RX.make=mkRx;

/* =========================================================
   DOCUMENT RENDERER  → professional A4 prescription HTML
   opts.audit=true shows the audit trail (admin only)
   ========================================================= */
function row(label,val){ if(val==null||val==='')return ''; return '<div><b>'+esc(label)+':</b> '+esc(val)+'</div>'; }
function cell(label,val,warn){ if(val==null||val==='')val='—'; return '<div class="rx-cell'+(warn?' warn':'')+'"><label>'+esc(label)+'</label><span>'+esc(val)+'</span></div>'; }
function block(html){ return '<div class="rx-block">'+html+'</div>'; }
function sec(ic,title,inner){ if(!inner)return ''; return '<div class="rx-sec"><div class="rx-sec-hd"><div class="rx-sec-ic">'+ic+'</div><h3>'+esc(title)+'</h3><div class="rx-hr"></div></div>'+inner+'</div>'; }
function tags(arr,cls){ if(!arr||!arr.length)return ''; return '<div class="rx-tags">'+arr.map(function(t){return '<span class="rx-tag'+(cls?' '+cls:'')+'">'+esc(t)+'</span>';}).join('')+'</div>'; }

RX.renderDoc=function(rx,opts){
  opts=opts||{};
  var d=rx.doctor,p=rx.patient,c=rx.consult,s=rx.summary,sy=rx.symptoms,ex=rx.exam,as=rx.assessment,fu=rx.followup,ad=rx.advice;
  var st=(rx.status||'').toLowerCase();
  var stamp2 = st==='approved'?'<div class="rx-stampbox"><div class="rx-stamp">✓ Approved<small>Reviewed by DrInsight Admin</small></div></div>'
    : st==='dismissed'?'<div class="rx-stampbox"><div class="rx-stamp dismissed">✕ Dismissed<small>Not dispensed — see notes</small></div></div>'
    : (st==='pending review')?'<div class="rx-stampbox"><div class="rx-stamp pending">⏳ Pending Review<small>Awaiting admin approval</small></div></div>'
    : '';

  /* HEADER */
  var head='<div class="rx-hd"><div class="rx-hd-top">'
    +'<div class="rx-brand"><div class="rx-logo-img"><img src="'+LOGO_IMG+'" alt="DrInsight"></div>'
      +'<div class="rx-tag">'+esc(BRAND.tagline)+'</div>'
      +'<div class="rx-contact"><span>🌐 '+esc(BRAND.website)+'</span><span>☎ '+esc(BRAND.phone)+'</span><span>💬 WhatsApp '+esc(BRAND.whatsapp)+'</span><span>✉ '+esc(BRAND.email)+'</span></div></div>'
    +'<div class="rx-hd-right"><span class="rx-ebadge">🔒 Electronic Prescription</span>'
      +'<div class="rx-qr">'+rxQR(rx.rxNo+'|'+rx.verifyId)+'<div class="rx-qr-cap">SCAN TO VERIFY</div></div></div>'
    +'</div>'
    +'<div class="rx-hd-meta">'
      +'<div class="rx-mchip"><b>Prescription No.</b><span>'+esc(rx.rxNo)+'</span></div>'
      +'<div class="rx-mchip"><b>Issued</b><span>'+esc(rx.issuedAt)+'</span></div>'
      +'<div class="rx-mchip"><b>Consultation ID</b><span>'+esc(c.consultId)+'</span></div>'
      +'<div class="rx-mchip"><b>Type</b><span>'+esc(c.type)+' Consultation</span></div>'
      +'<div class="rx-mchip"><b>Verification</b><span>'+esc(rx.verifyId)+'</span></div>'
    +'</div></div>';

  /* IDENTITY BAND */
  var idband='<div class="rx-idband">'
    +'<div class="rx-idcol doc"><div class="rx-idlabel">🩺 Prescribing Physician</div>'
      +'<div class="rx-idname">'+esc(d.name)+'</div><div class="rx-idsub">'+esc(d.specialization)+'</div>'
      +'<div class="rx-idrows">'+row('Qualification',d.qualification)+row('Reg. No (PMDC)',d.reg)+row('Doctor ID',c.doctorId)+'</div></div>'
    +'<div class="rx-idcol"><div class="rx-idlabel">👤 Patient</div>'
      +'<div class="rx-idname">'+esc(p.name)+'</div><div class="rx-idsub">'+esc(p.age)+' yrs · '+esc(p.gender)+' · '+esc(p.blood)+'</div>'
      +'<div class="rx-idrows">'+row('Patient ID',p.id)+row('Contact',p.phone)+row('City',(p.city&&p.country)?p.city+', '+p.country:(p.city||p.country))+'</div></div>'
    +'</div>';

  /* CONSULTATION LINKAGE */
  var linkage=sec('🔗','Consultation Record',
    '<div class="rx-grid">'+cell('Consultation ID',c.consultId)+cell('Appointment ID',c.apptId)+cell('Date & Time',c.dateTime)+cell('Status',c.status)
    +cell('Consultation Type',c.type)+cell('Doctor ID',c.doctorId)+cell('Patient ID',c.patientId)+cell('Follow-up Ref',c.followupRef)+'</div>');

  /* PATIENT DETAILS */
  var pinfo=sec('👤','Patient Information',
    '<div class="rx-grid">'+cell('Full Name',p.name)+cell('Date of Birth',p.dob)+cell('Age / Gender',p.age+' yrs / '+p.gender)+cell('Blood Group',p.blood)
    +cell('Height',p.height)+cell('Weight',p.weight)+cell('BMI',p.bmi)+cell('Emergency Contact',p.emergency)
    +cell('Phone',p.phone)+cell('Email',p.email)+cell('City',p.city)+cell('Country',p.country)
    +cell('Allergies',p.allergies,String(p.allergies||'').toLowerCase().indexOf('none')<0)
    +cell('Chronic Conditions',p.chronic)+'<div class="rx-cell full"><label>Current Medications</label><span>'+esc(p.currentMeds)+'</span></div></div>');

  /* CONSULTATION SUMMARY */
  var sumInner='';
  if(s.reason||s.chiefComplaint||s.notes||s.symptomDuration||s.prevTreatment||(s.reports&&s.reports.length)){
    var g='<div class="rx-grid g2">'+cell('Reason for Consultation',s.reason)+cell('Symptom Duration',s.symptomDuration)+'</div>';
    var txt='';
    if(s.chiefComplaint)txt+='<p><b>Chief Complaint —</b> '+esc(s.chiefComplaint)+'</p>';
    if(s.notes)txt+='<p><b>Notes —</b> '+esc(s.notes)+'</p>';
    if(s.prevTreatment)txt+='<p><b>Previous Treatment —</b> '+esc(s.prevTreatment)+'</p>';
    if(s.prevConsultRef)txt+='<p><b>Previous Consultation —</b> '+esc(s.prevConsultRef)+'</p>';
    sumInner=g+(txt?block(txt):'')+(s.reports&&s.reports.length?'<div style="margin-top:8px">'+tags(s.reports.map(function(r){return '📎 '+r;}),'inv')+'</div>':'');
  }
  var summary=sec('📋','Consultation Summary',sumInner);

  /* SYMPTOMS */
  var symInner='';
  if((sy.reported&&sy.reported.length)||sy.severity||sy.progression||sy.associated){
    symInner=(sy.reported&&sy.reported.length?tags(sy.reported):'')
      +'<div class="rx-grid" style="margin-top:'+(sy.reported&&sy.reported.length?'8px':'0')+'">'
      +cell('Duration',sy.duration)+cell('Severity',sy.severity)+cell('Frequency',sy.frequency)+cell('Progression',sy.progression)+'</div>'
      +((sy.associated||sy.aggravating||sy.relieving)?block(
        (sy.associated?'<p><b>Associated —</b> '+esc(sy.associated)+'</p>':'')
        +(sy.aggravating?'<p><b>Aggravating factors —</b> '+esc(sy.aggravating)+'</p>':'')
        +(sy.relieving?'<p><b>Relieving factors —</b> '+esc(sy.relieving)+'</p>':'')):'');
  }
  var symptoms=sec('🩹','Symptoms',symInner);

  /* VIRTUAL EXAMINATION */
  var examCells=cell('General Appearance',ex.appearance)+cell('Alertness',ex.alertness)+cell('Speech',ex.speech)+cell('Respiratory Distress',ex.respiratory)
    +cell('Visible Swelling',ex.swelling)+cell('Skin Findings',ex.skin)+cell('Temperature (home)',ex.temp)+cell('Blood Pressure (home)',ex.bp)
    +cell('Blood Sugar (home)',ex.sugar)+cell('SpO₂ (oximeter)',ex.spo2)+cell('Heart Rate (home)',ex.hr)+cell('Other Home Data',ex.other);
  var examHas=[ex.appearance,ex.alertness,ex.speech,ex.respiratory,ex.swelling,ex.skin,ex.temp,ex.bp,ex.sugar,ex.spo2,ex.hr,ex.other,ex.observations].some(function(v){return v;});
  var exam=sec('🎥','Virtual Assessment', examHas?('<div class="rx-grid">'+examCells+'</div>'+(ex.observations?block('<p><b>Physician observations —</b> '+esc(ex.observations)+'</p>'):'')):'');

  /* CLINICAL ASSESSMENT */
  var asHas=[as.provisional,as.differential,as.icd10,as.impression,as.risk].some(function(v){return v;});
  var assess=sec('🧠','Clinical Assessment', asHas?block(
    (as.provisional?'<p><b>Provisional Diagnosis —</b> '+esc(as.provisional)+(as.icd10?' <span style="color:#0891b2;font-weight:600">(ICD-10: '+esc(as.icd10)+')</span>':'')+'</p>':'')
    +(as.differential?'<p><b>Differential —</b> '+esc(as.differential)+'</p>':'')
    +(as.impression?'<p><b>Clinical Impression —</b> '+esc(as.impression)+'</p>':'')

  /* INVESTIGATIONS */

/* =========================================================
   VIEWER  (role-aware action bar) + PRINT
   ========================================================= */
function ensureViewer(){
  var v=document.getElementById('rxViewer');
  if(!v){ v=document.createElement('div'); v.id='rxViewer';
    v.innerHTML='<div class="rx-vw-bar"><div class="rx-vw-title" id="rxVwTitle"></div><div id="rxVwActions" style="display:flex;gap:8px;flex-wrap:wrap"></div></div><div class="rx-vw-scroll" id="rxVwScroll"></div>';
    document.body.appendChild(v);
    v.addEventListener('click',function(e){ if(e.target===v) RX.closeViewer(); });
    document.addEventListener('keydown',function(e){ if(e.key==='Escape' && v.classList.contains('open')) RX.closeViewer(); });
  }
  return v;
}
RX._current=null;

RX.openViewer=function(rx,role,opts){
  opts=opts||{}; role=role||'patient'; RX._current=rx;
  var v=ensureViewer();
  var showAudit=(role==='admin');
  document.getElementById('rxVwScroll').innerHTML=RX.renderDoc(rx,{audit:showAudit,showPrivate:(role!=='patient')});
  var stCls={ 'approved':'appr','dismissed':'dism','pending review':'pend','draft':'draft','finalized':'final' }[(rx.status||'').toLowerCase()]||'final';
  document.getElementById('rxVwTitle').innerHTML='💊 e-Prescription <span class="rx-schip '+stCls+'">'+esc(rx.status)+'</span> <span class="rx-vw-no">'+esc(rx.rxNo)+'</span>';

  var acts=[];
  acts.push('<button class="rx-vw-btn blue" onclick="RX.print()">🖨️ Print</button>');
  acts.push('<button class="rx-vw-btn green" onclick="RX.download()">⬇️ Download PDF</button>');
  if(role==='patient'){
    acts.push('<button class="rx-vw-btn ghost" onclick="RX.print()">🔬 Investigation Slip</button>');
  }
  if(role==='admin' && opts.review){
    acts.push('<button class="rx-vw-btn green" onclick="RX.adminDecide(\'Approved\')">✓ Approve</button>');
    acts.push('<button class="rx-vw-btn red" onclick="RX.adminDecide(\'Dismissed\')">✕ Dismiss</button>');
  }
  acts.push('<button class="rx-vw-btn x" onclick="RX.closeViewer()">✕ Close</button>');
  document.getElementById('rxVwActions').innerHTML=acts.join('');
  v.classList.add('open'); document.body.style.overflow='hidden';
  document.getElementById('rxVwScroll').scrollTop=0;
};
RX.closeViewer=function(){ var v=document.getElementById('rxViewer'); if(v){v.classList.remove('open');} document.body.style.overflow=''; };
RX.print=function(){ window.print(); };
RX.download=function(){ rxToast('Opening print dialog — choose “Save as PDF” to download'); setTimeout(function(){window.print();},350); };

/* admin decision hook — overridden per-file where a queue exists */
RX.onAdminDecision=null;
RX.adminDecide=function(decision){
  var rx=RX._current; if(!rx)return;
  rx.status=decision;
  rx.audit=rx.audit||[]; rx.audit.unshift({time:stamp(),who:'Admin · Support',action:(decision==='Approved'?'Approved & released to patient':'Dismissed — flagged for physician review')});
  if(typeof RX.onAdminDecision==='function'){ try{RX.onAdminDecision(rx,decision);}catch(e){} }
  rxToast(decision==='Approved'?'✓ Prescription approved':'Prescription dismissed');
  RX.closeViewer();
};

})();
</script>

<script id="oc-core-script">
(function(){
if(window.OC)return;
var LS='drinsight_oc_consults_v1', LN='drinsight_oc_notifs_v1';
var OC=window.OC={};
function esc(s){return (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
OC.esc=esc;
function pad(n){return n<10?'0'+n:''+n;}
function iso(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function disp(d){return d.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});}
function shift(days){var d=new Date();d.setDate(d.getDate()+days);return d;}
OC.todayISO=function(){return iso(new Date());};
OC.stamp=function(){var d=new Date();return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'})+' · '+d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});};

/* ---------- consultation type metadata (Video / Voice / Chat) ---------- */
var TYPES={
  Video:{ic:'📹',label:'Video Consultation',short:'Video Call',join:'📹 Join Video Call',start:'📹 Start Video Call',meetLbl:'Meeting Link'},
  Voice:{ic:'📞',label:'Voice Consultation',short:'Voice Call',join:'📞 Join Voice Call',start:'📞 Start Voice Call',meetLbl:'Call Details'},
  Chat:{ic:'💬',label:'Chat Consultation',short:'Chat',join:'💬 Open Chat',start:'💬 Start Chat',meetLbl:'Chat Room'}
};
OC.type=function(t){return TYPES[t]||TYPES.Video;};

/* ---------- shared seed data (patient · doctor · admin views of the SAME records) ---------- */
var DRS={
  JK:{name:'Dr. Javed Kumbhar',init:'JK',bg:'linear-gradient(135deg,#0f3d7a,#1a56a0)',spec:'❤️ Cardiology · Board Certified',specialty:'Cardiology'},
  JO:{name:'Dr. James Okafor',init:'JO',bg:'linear-gradient(135deg,#0891b2,#06b6d4)',spec:'🧠 Neurology · Board Certified',specialty:'Neurology'},
  SM:{name:'Dr. Sarah Mitchell',init:'SM',bg:'linear-gradient(135deg,#7c3aed,#a78bfa)',spec:'❤️ Cardiology · Board Certified',specialty:'Cardiology'},
  PS:{name:'Dr. Priya Sharma',init:'PS',bg:'linear-gradient(135deg,#059669,#10b981)',spec:'🦋 Endocrinology · FCPS',specialty:'Endocrinology'}
};
var PTS={
  SJ:{name:'Sarah Johnson',init:'SJ',bg:'linear-gradient(135deg,#1a56a0,#4a90d9)',age:34},
  AR:{name:'Ahmed Raza',init:'AR',bg:'linear-gradient(135deg,#7c3aed,#8b5cf6)',age:41},
  FK:{name:'Fatima Khan',init:'FK',bg:'linear-gradient(135deg,#059669,#10b981)',age:52},
  MH:{name:'Muhammad Hassan',init:'MH',bg:'linear-gradient(135deg,#d97706,#fbbf24)',age:47},
  SA:{name:'Sara Malik',init:'SA',bg:'linear-gradient(135deg,#e11d48,#f43f5e)',age:29},
  NB:{name:'Nadia Baig',init:'NB',bg:'linear-gradient(135deg,#be185d,#ec4899)',age:36}
};
OC.ME_PATIENT='Sarah Johnson'; OC.ME_DOCTOR='Dr. Javed Kumbhar';
function meet(type,id){
  if(type==='Video')return{link:'https://meet.drinsight.org/'+id.toLowerCase()};
  if(type==='Voice')return{phone:'+92 21 111-374-674 · Bridge code '+id.slice(3)};
  return{room:'Secure chat room #'+id.toLowerCase()+' (opens at the scheduled time)'};
}
function C(id,pt,dr,type,dO,time,dur,fee,status,reason,extra){
  var c={id:id,apptId:'APT-'+id.slice(3)+'7',patient:PTS[pt],doctor:DRS[dr],specialty:DRS[dr].specialty,
    type:type,dateISO:iso(dO),date:disp(dO),time:time,dur:dur,fee:fee,status:status,reason:reason,
    meet:meet(type,id),notes:[],rxKey:null,attachments:[],rating:null,reschedReq:null,rejected:false,
    cancelledBy:null,cancelReason:null,approvedAt:null,
    audit:[{t:OC.stamp(),w:PTS[pt].name+' (Patient)',a:'Consultation request submitted from the public booking page'}]};
  for(var k in (extra||{}))c[k]=extra[k];
  return c;
}
function seed(){
  var T=shift(0),TM=shift(1);
  return [
    C('OC-9001','SJ','JK','Video',shift(3),'10:00 AM','30 min','$120','pending','Palpitations follow-up — recent Holter monitor results to discuss.'),
    C('OC-9002','AR','JK','Chat',shift(2),'Async · 24h','—','$60','pending','ECG report query — second opinion on sinus arrhythmia.'),
    C('OC-9003','SJ','JO','Video',TM,'3:00 PM','30 min','$120','upcoming','Follow-up on recurring migraines. Bring your headache diary.',{approvedAt:'Jul 8, 2026'}),
    C('OC-9004','SJ','SM','Voice',shift(6),'11:00 AM','20 min','$90','upcoming','ECG results review. Have recent lab reports at hand.',{approvedAt:'Jul 9, 2026'}),
    C('OC-9005','FK','JK','Video',T,'5:30 PM','30 min','$120','upcoming','Hypertension review — home BP log discussion.',{approvedAt:'Jul 10, 2026'}),
    C('OC-9006','MH','JK','Voice',T,'4:00 PM','20 min','$90','ongoing','Echo results discussion — EF trend review.',{approvedAt:'Jul 9, 2026'}),
    C('OC-9007','SJ','PS','Chat',T,'Async · 24h','—','$60','ongoing','Thyroid panel discussion (chat in progress).',{approvedAt:'Jul 11, 2026'}),
    C('OC-9008','SJ','PS','Chat',new Date('2026-05-28T12:00:00'),'2:45 PM','25 min','$60','completed','HbA1c review — pre-diabetes monitoring.',{rxKey:'METF',rating:5,approvedAt:'May 26, 2026',notes:[{t:'28 May 2026 · 03:10 PM',w:'Dr. Priya Sharma',text:"HbA1c slightly elevated at 6.2%. Continue current diet plan. Recheck in 3 months. Metformin 500mg BD initiated."}]}),
    C('OC-9009','SJ','JO','Video',new Date('2026-05-14T12:00:00'),'4:00 PM','40 min','$120','completed','Migraine assessment.',{rxKey:'SUMA',approvedAt:'May 12, 2026',notes:[{t:'14 May 2026 · 04:45 PM',w:'Dr. James Okafor',text:'Migraines likely tension-type. Prescribed Sumatriptan 50mg PRN. Avoid known triggers.'}]}),
    C('OC-9010','SA','JK','Video',new Date('2026-06-03T12:00:00'),'10:30 AM','30 min','$120','completed','BP review.',{approvedAt:'Jun 1, 2026',notes:[{t:'03 Jun 2026 · 11:05 AM',w:'Dr. Javed Kumbhar',text:'BP controlled, continue meds. Review in 8 weeks.'}]}),
    C('OC-9011','SJ','SM','Voice',new Date('2026-04-20T12:00:00'),'9:00 AM','20 min','$90','cancelled','Lipid panel discussion.',{cancelledBy:'Patient',cancelReason:'Schedule conflict — will rebook.'}),
    C('OC-9012','NB','JK','Chat',new Date('2026-06-30T12:00:00'),'Async · 24h','—','$60','cancelled','New — ECG review request.',{rejected:true,cancelledBy:'Doctor',cancelReason:'Slot unavailable this week — please rebook for next availability.'})
  ];
}

/* ---------- persistence + cross-dashboard sync ---------- */
var DB=null;
function load(){
  try{var raw=localStorage.getItem(LS);if(raw){DB=JSON.parse(raw);if(Array.isArray(DB)&&DB.length)return;}}catch(e){}
  DB=seed();save(false);
}
function save(fire){
  try{localStorage.setItem(LS,JSON.stringify(DB));}catch(e){}
  if(fire!==false&&typeof window.OC_RERENDER==='function')window.OC_RERENDER();
}
load();
OC.all=function(){return DB;};
OC.get=function(id){for(var i=0;i<DB.length;i++)if(DB[i].id===id)return DB[i];return null;};
OC.save=save;
OC.reset=function(){DB=seed();save();notifs=[];try{localStorage.setItem(LN,JSON.stringify(notifs));}catch(e){}};

/* ---------- shared notification feed ---------- */
var notifs=[];
try{notifs=JSON.parse(localStorage.getItem(LN)||'[]')||[];}catch(e){notifs=[];}
if(!notifs.length){
  notifs=[
    {t:OC.stamp(),ic:'📥',text:'New Video consultation request OC-9001 — Sarah Johnson → Dr. Javed Kumbhar'},
    {t:OC.stamp(),ic:'⏰',text:'Reminder: consultations scheduled today — check Upcoming / Today\u2019s list'},
    {t:OC.stamp(),ic:'🟢',text:'Voice consultation OC-9006 started — status is now Ongoing on all dashboards'}
  ];
  try{localStorage.setItem(LN,JSON.stringify(notifs));}catch(e){}
}
OC.notify=function(ic,text){
  notifs.unshift({t:OC.stamp(),ic:ic,text:text});
  if(notifs.length>40)notifs.length=40;
  try{localStorage.setItem(LN,JSON.stringify(notifs));}catch(e){}
};
OC.notifs=function(){return notifs;};
OC.notifCard=function(n){
  var list=notifs.slice(0,n||4).map(function(x){
    return '<div class="oc-notif-item"><div class="ic">'+x.ic+'</div><div>'+esc(x.text)+'<span class="tm">'+esc(x.t)+'</span></div></div>';
  }).join('')||'<div class="oc-notif-item">No notifications yet.</div>';
  return '<div class="oc-notif-card"><div class="oc-notif-hd">🔔 Consultation Notifications <span style="font-weight:500;color:var(--gray-400)">— synced across Patient · Doctor · Admin</span><span class="cnt">'+notifs.length+'</span></div>'+list+'</div>';
};

/* cross-tab sync: another dashboard changed the store */
window.addEventListener('storage',function(e){
  if(e.key===LS||e.key===LN){
    try{if(e.key===LS)DB=JSON.parse(e.newValue)||DB;else notifs=JSON.parse(e.newValue)||notifs;}catch(err){}
    if(typeof window.OC_RERENDER==='function')window.OC_RERENDER();
    if(typeof window.showToast==='function'&&e.key===LS)window.showToast('🔄 Consultation status updated on another dashboard');
  }
});

/* ---------- status chips + card helpers (existing design system classes) ---------- */
OC.chip=function(c){
  if(c.status==='pending')return '<span class="cons-chip cc-pending">🕒 Pending Approval</span>';
  if(c.status==='upcoming')return '<span class="cons-chip cc-up">📅 Upcoming</span>'+(c.reschedReq?'<span class="oc-flag">🗓️ Reschedule requested</span>':'');
  if(c.status==='ongoing')return '<span class="cons-chip cc-live">🔴 Ongoing</span>';
  if(c.status==='completed')return '<span class="cons-chip cc-done">✓ Completed</span>';
  return '<span class="cons-chip cc-cancel">'+(c.rejected?'⛔ Rejected':'✕ Cancelled')+'</span>';
};
OC.cardClass=function(c){return {pending:'pending',upcoming:'upcoming',ongoing:'upcoming',completed:'completed',cancelled:'cancelled'}[c.status]||'';};
OC.details=function(c){
  var t=OC.type(c.type);
  return '<div class="cons-details"><span>'+t.ic+' '+esc(t.label)+'</span><span>📅 '+esc(c.date)+'</span><span>⏰ '+esc(c.time)+'</span><span>⏱️ '+esc(c.dur)+'</span><span>💵 '+esc(c.fee)+'</span><span>🆔 '+esc(c.id)+'</span></div>';
};
OC.meetLine=function(c){
  var t=OC.type(c.type);
  var v=c.type==='Video'?('<code>'+esc(c.meet.link)+'</code>'):c.type==='Voice'?('<code>'+esc(c.meet.phone)+'</code>'):('<code>'+esc(c.meet.room)+'</code>');
  return '<div class="oc-meet">'+t.ic+' <strong>'+t.meetLbl+':</strong> '+v+'</div>';
};

/* ---------- workflow transitions (each fires the interlinked notification) ---------- */
function audit(c,who,what){c.audit.unshift({t:OC.stamp(),w:who,a:what});}
OC.accept=function(id){var c=OC.get(id);if(!c)return;
  c.status='upcoming';c.approvedAt=OC.stamp();c.rejected=false;
  audit(c,c.doctor.name+' (Doctor)','Request accepted — consultation confirmed');
  OC.notify('✅','Consultation '+c.id+' accepted by '+c.doctor.name+' — moved to Upcoming for Patient, Doctor & Admin');
  save();};
OC.reject=function(id,reason){var c=OC.get(id);if(!c)return;
  c.status='cancelled';c.rejected=true;c.cancelledBy='Doctor';c.cancelReason=reason||'Not specified';
  audit(c,c.doctor.name+' (Doctor)','Request rejected — '+(reason||'no reason given'));
  OC.notify('⛔','Consultation '+c.id+' rejected by '+c.doctor.name+' — Patient & Admin notified');
  save();};
OC.reschedule=function(id,date,time,by){var c=OC.get(id);if(!c)return;
  var d=date?new Date(date+'T00:00:00'):null;
  if(d){c.dateISO=iso(d);c.date=disp(d);}
  if(time)c.time=time;
  c.status='upcoming';c.reschedReq=null;if(!c.approvedAt)c.approvedAt=OC.stamp();
  audit(c,(by||'Doctor'),'Consultation rescheduled to '+c.date+' · '+c.time);
  OC.notify('🗓️','Consultation '+c.id+' rescheduled to '+c.date+' '+c.time+' — Patient & Admin notified');
  save();};
OC.requestResched=function(id,pref){var c=OC.get(id);if(!c)return;
  c.reschedReq=pref||'Patient requested a new time';
  audit(c,c.patient.name+' (Patient)','Reschedule requested — '+c.reschedReq);
  OC.notify('🙋','Patient requested rescheduling for '+c.id+' ('+c.reschedReq+') — Doctor & Admin notified');
  save();};
OC.start=function(id){var c=OC.get(id);if(!c)return;
  c.status='ongoing';
  audit(c,c.doctor.name+' (Doctor)',OC.type(c.type).label+' started');
  OC.notify('🟢',OC.type(c.type).label+' '+c.id+' started — status is now Ongoing on all dashboards');
  save();};
OC.complete=function(id){var c=OC.get(id);if(!c)return;
  c.status='completed';
  audit(c,c.doctor.name+' (Doctor)','Consultation marked as Completed');
  OC.notify('🏁','Consultation '+c.id+' completed — prescription & notes now visible to the Patient');
  save();};
OC.cancel=function(id,by,reason){var c=OC.get(id);if(!c)return;
  c.status='cancelled';c.rejected=false;c.cancelledBy=by;c.cancelReason=reason||'Not specified';
  audit(c,by,'Consultation cancelled — '+(reason||'no reason given'));
  OC.notify('❌','Consultation '+c.id+' cancelled by '+by+' — all dashboards updated');
  save();};
OC.setStatus=function(id,status,by){var c=OC.get(id);if(!c)return;
  if(status==='cancelled'){OC.cancel(id,by||'Admin','Status updated by admin');return;}
  if(status==='completed'){c.status='completed';audit(c,by||'Admin','Status manually set to Completed');OC.notify('🏁','Consultation '+c.id+' marked Completed by '+(by||'Admin'));save();return;}
  if(status==='upcoming'&&c.status==='pending'){OC.accept(id);return;}
  c.status=status;if(status==='upcoming'&&!c.approvedAt)c.approvedAt=OC.stamp();
  audit(c,by||'Admin','Status manually updated to '+status);
  OC.notify('🛠️','Consultation '+c.id+' status set to '+status+' by '+(by||'Admin'));
  save();};
OC.addNote=function(id,who,text){var c=OC.get(id);if(!c||!text)return;
  c.notes.unshift({t:OC.stamp(),w:who,text:text});
  audit(c,who,'Consultation note added');
  save();};
OC.addAttachment=function(id,name){var c=OC.get(id);if(!c)return;
  c.attachments.push(name);audit(c,c.doctor.name+' (Doctor)','Attachment uploaded — '+name);
  OC.notify('📎','Attachment "'+name+'" added to consultation '+c.id);
  save();};
OC.attachRx=function(id,rxNo){var c=OC.get(id);if(!c)return;
  c.rxKey=c.rxKey||'NEW';c.rxNo=rxNo||c.rxNo;
  audit(c,c.doctor.name+' (Doctor)','e-Prescription '+(rxNo||'')+' issued for this consultation');
  OC.notify('💊','e-Prescription uploaded for consultation '+c.id+' — Patient notified');
  save();};

/* ---------- filtered views ---------- */
OC.forPatient=function(status){return DB.filter(function(c){return c.patient.name===OC.ME_PATIENT&&(status?c.status===status:true);});};
OC.forDoctor=function(status){return DB.filter(function(c){return c.doctor.name===OC.ME_DOCTOR&&(status?c.status===status:true);});};
OC.todayFor=function(list){var t=OC.todayISO();return list.filter(function(c){return c.dateISO===t&&(c.status==='upcoming'||c.status==='ongoing');});};

/* ---------- audit timeline html ---------- */
OC.auditHtml=function(c){
  return '<div class="cons-note-list">'+c.audit.map(function(a){
    return '<div class="cons-note-item">'+esc(a.a)+'<span class="cons-note-time">'+esc(a.t)+' — '+esc(a.w)+'</span></div>';
  }).join('')+'</div>';
};
})();
</script>

/* ---------- filters ---------- */

function opts(list,sel){return '<option value="">All</option>'+list.map(function(v){return '<option'+(v===sel?' selected':'')+'>'+esc(v)+'</option>';}).join('');}
function uniq(fn){var s={};OC.all().forEach(function(c){s[fn(c)]=1;});return Object.keys(s).sort();}
function filterBar(){

    '<div class="fg-item"><label>Patient</label><select onchange="OCA.setF(\'patient\',this.value)">'+opts(uniq(function(c){return c.patient.name;}),F.patient)+'</select></div>'+
    '<div class="fg-item"><label>Consultation Type</label><select onchange="OCA.setF(\'type\',this.value)">'+opts(['Video','Voice','Chat'],F.type)+'</select></div>'+
    '<div class="fg-item"><label>Specialty</label><select onchange="OCA.setF(\'spec\',this.value)">'+opts(uniq(function(c){return c.specialty;}),F.spec)+'</select></div>'+
    '<div class="fg-item"><label>From</label><input type="date" value="'+F.from+'" onchange="OCA.setF(\'from\',this.value)"></div>'+
    '<div class="fg-item"><label>To</label><input type="date" value="'+F.to+'" onchange="OCA.setF(\'to\',this.value)"></div>'+
  '</div></div></div>';
}
OCA.clearF=function(){F={doctor:'',patient:'',type:'',spec:'',from:'',to:'',q:''};window.goto(window._admCur);};
function applyF(list){
  return list.filter(function(c){
    if(F.doctor&&c.doctor.name!==F.doctor)return false;
    if(F.patient&&c.patient.name!==F.patient)return false;
    if(F.type&&c.type!==F.type)return false;
    if(F.spec&&c.specialty!==F.spec)return false;
    if(F.from&&c.dateISO<F.from)return false;
    if(F.to&&c.dateISO>F.to)return false;
    return true;
  });
}

/* ---------- status chips (admin chip classes) ---------- */
function aChip(c){
  if(c.status==='pending')return '<span class="chip ch-a">🕒 Pending</span>';
  if(c.status==='upcoming')return '<span class="chip ch-b">📅 Upcoming</span>';
  if(c.status==='ongoing')return '<span class="chip ch-g">🔴 Ongoing</span>';
  if(c.status==='completed')return '<span class="chip ch-g">✓ Completed</span>';
  return '<span class="chip '+(c.rejected?'ch-r':'ch-gray')+'">'+(c.rejected?'⛔ Rejected':'✕ Cancelled')+'</span>';
}
function typeChip(t){var m=OC.type(t);return '<span class="chip ch-b">'+m.ic+' '+t+'</span>';}
function avat(p){return '<div style="display:flex;align-items:center;gap:8px"><div class="cell-av" style="background:'+p.bg+'">'+p.init+'</div><span>'+esc(p.name)+'</span></div>';}

/* ---------- shared table ---------- */
function statusSelect(c){
  var sts=['pending','upcoming','ongoing','completed','cancelled'];
  return '<select onchange="OCA.status(\''+c.id+'\',this.value)" style="font-family:inherit;font-size:.72rem;border:1px solid var(--gray-200);border-radius:8px;padding:4px 6px;background:#fff">'+
    sts.map(function(s){return '<option value="'+s+'"'+(s===c.status?' selected':'')+'>'+s.charAt(0).toUpperCase()+s.slice(1)+'</option>';}).join('')+'</select>';
}
function ocTable(title,list,showStatusCol){
  var rows=list.map(function(c){
    return ['<strong>'+c.id+'</strong>',avat(c.patient),avat(c.doctor),esc(c.specialty),typeChip(c.type),
      esc(c.date)+'<div style="font-size:.7rem;color:var(--gray-400)">'+esc(c.time)+'</div>',esc(c.fee),
      aChip(c)+(c.reschedReq?'<div style="font-size:.66rem;color:var(--purple);font-weight:700;margin-top:3px">🙋 Resched. requested</div>':''),
      '<div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap"><button class="tbl-btn" onclick="OCA.view(\''+c.id+'\')">👁 View</button>'+statusSelect(c)+'</div>'];
  });
  if(!rows.length)return '<div class="panel"><div class="panel-hd"><h3>'+title+'</h3></div><div class="panel-bd"><div class="oc-empty"><span class="big">🗂️</span>No consultations match the current filters.</div></div></div>';
  return panelTable(title,'<button class="btn" onclick="OCA.exportCsv()">⬇ Export CSV</button>',
    ['ID','Patient','Doctor','Specialty','Type','Date &amp; Time','Fee','Status','Actions'],rows,
    'Showing '+rows.length+' consultation'+(rows.length===1?'':'s'));
}

/* ---------- pages ---------- */
var TITLES={'oc-pending':'🕒 Pending Consultation Requests','oc-approved':'✅ Approved Consultations','oc-upcoming':'📅 Upcoming Consultations','oc-ongoing':'🟢 Ongoing Consultations','oc-completed':'🏁 Completed Consultations','oc-cancelled':'❌ Cancelled & Rejected Consultations'};
window.pgOC=function(view){
  var all=OC.all(),list;
  if(view==='oc-pending')list=all.filter(function(c){return c.status==='pending';});
  else if(view==='oc-approved')list=all.filter(function(c){return !!c.approvedAt;});
  else if(view==='oc-cancelled')list=all.filter(function(c){return c.status==='cancelled';});
  else list=all.filter(function(c){return c.status===view.replace('oc-','');});
  list=applyF(list).slice().sort(function(a,b){return a.dateISO<b.dateISO?1:-1;});
  var counts={pending:0,upcoming:0,ongoing:0,completed:0,cancelled:0};
  all.forEach(function(c){counts[c.status]++;});
  var stats=statCards([
    {ic:'ic3',icon:'🕒',num:String(counts.pending),label:'Pending',tag:'awaiting doctor',tagClass:'tt-a'},
    {ic:'ic1',icon:'📅',num:String(counts.upcoming),label:'Upcoming',tag:'confirmed',tagClass:'tt-b'},
    {ic:'ic2',icon:'🟢',num:String(counts.ongoing),label:'Ongoing',tag:'live now',tagClass:'tt-g'},
    {ic:'ic4',icon:'🏁',num:String(counts.completed),label:'Completed',tag:String(counts.cancelled)+' cancelled',tagClass:'tt-g'}
  ]);
  return OC.notifCard(3)+stats+filterBar()+ocTable(TITLES[view]||'Consultations',list);
};

/* ---------- details modal (existing modalMount pattern) ---------- */
OCA.view=function(id){var c=OC.get(id);if(!c)return;var t=OC.type(c.type);
  var meet=c.type==='Video'?c.meet.link:c.type==='Voice'?c.meet.phone:c.meet.room;
  var html='<div class="modal"><div class="modal-hd"><h3>'+t.ic+' Consultation '+c.id+'</h3><button class="modal-close" onclick="closeModal()">✕</button></div>'+
    '<div class="modal-bd">'+
    '<div class="form-grid" style="grid-template-columns:1fr 1fr;gap:10px">'+

      '<div class="fg-item"><label>Doctor</label><input value="'+esc(c.doctor.name)+'" readonly></div>'+
      '<div class="fg-item"><label>Specialty</label><input value="'+esc(c.specialty)+'" readonly></div>'+
      '<div class="fg-item"><label>Type</label><input value="'+esc(t.label)+'" readonly></div>'+
      '<div class="fg-item"><label>Date &amp; Time</label><input value="'+esc(c.date)+' · '+esc(c.time)+'" readonly></div>'+
      '<div class="fg-item"><label>Fee</label><input value="'+esc(c.fee)+'" readonly></div>'+

      '<div class="fg-item full"><label>Reason</label><input value="'+esc(c.reason)+'" readonly></div>'+
    '</div>'+
    (c.cancelReason?'<p style="font-size:.8rem;color:var(--red);margin-top:10px"><b>'+(c.rejected?'Rejected':'Cancelled by '+esc(c.cancelledBy||''))+':</b> '+esc(c.cancelReason)+'</p>':'')+
    (c.notes.length?'<div style="margin-top:12px"><label style="font-size:.72rem;font-weight:700;color:var(--gray-500);text-transform:uppercase">Doctor Notes</label>'+c.notes.map(function(n){return '<div style="background:var(--gray-50);border-left:3px solid var(--blue);border-radius:8px;padding:8px 11px;font-size:.8rem;margin-top:6px">'+esc(n.text)+'<div style="font-size:.66rem;color:var(--gray-400);margin-top:3px">'+esc(n.t)+' — '+esc(n.w)+'</div></div>';}).join('')+'</div>':'')+
    '<div style="margin-top:12px"><label style="font-size:.72rem;font-weight:700;color:var(--gray-500);text-transform:uppercase">Status Timeline (Audit Log)</label>'+
      c.audit.map(function(a){return '<div style="background:var(--gray-50);border-left:3px solid var(--gray-200);border-radius:8px;padding:7px 11px;font-size:.78rem;margin-top:6px">'+esc(a.a)+'<div style="font-size:.66rem;color:var(--gray-400);margin-top:2px">'+esc(a.t)+' — '+esc(a.w)+'</div></div>';}).join('')+
    '</div></div>'+
    '<div class="modal-ft">'+
      (c.status==='pending'?'<button class="btn green" onclick="OC.accept(\''+c.id+'\');closeModal();showToast(\'✅ Approved — moved to Upcoming on all dashboards\')">✓ Approve</button>':'')+
      (c.status!=='cancelled'&&c.status!=='completed'?'<button class="btn danger" onclick="OC.cancel(\''+c.id+'\',\'Admin\',\'Cancelled by admin\');closeModal();showToast(\'❌ Cancelled — all users notified\')">✕ Cancel</button>':'')+
      '<button class="btn" onclick="closeModal()">Close</button>'+
    '</div></div>';
  var mount=document.getElementById('modalMount');
  mount.innerHTML=html;mount.classList.remove('hidden');
};
OCA.status=function(id,st){
  OC.setStatus(id,st,'Admin');
  showToast('🛠️ '+id+' status updated to '+st+' — synced to Patient & Doctor dashboards');
};

/* ---------- CSV export ---------- */
OCA.exportCsv=function(){
  var head=['ID','Patient','Doctor','Specialty','Type','Date','Time','Duration','Fee','Status','Rejected','Cancelled By','Reason'];
  var lines=[head.join(',')].concat(OC.all().map(function(c){
    return [c.id,c.patient.name,c.doctor.name,c.specialty,c.type,c.date,c.time,c.dur,c.fee,c.status,c.rejected?'yes':'no',c.cancelledBy||'',(c.reason||'').replace(/,/g,';')]
      .map(function(v){return '"'+String(v).replace(/"/g,'""')+'"';}).join(',');
  }));
  var blob=new Blob([lines.join('\n')],{type:'text/csv'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='drinsight-consultation-report.csv';document.body.appendChild(a);a.click();a.remove();
  showToast('⬇ Consultation report exported (CSV)');
};

/* ---------- reports page ---------- */
window.pgOCReports=function(){
  var all=OC.all(),n=all.length;
  var done=all.filter(function(c){return c.status==='completed';}).length;
  var canc=all.filter(function(c){return c.status==='cancelled';}).length;
  var rev=all.filter(function(c){return c.status==='completed';}).reduce(function(s,c){return s+(parseInt(String(c.fee).replace(/[^0-9]/g,''),10)||0);},0);
  var stats=statCards([
    {ic:'ic1',icon:'📅',num:String(n),label:'Total Consultations',tag:'all types',tagClass:'tt-b'},
    {ic:'ic2',icon:'🏁',num:String(done),label:'Completed',tag:Math.round(done/n*100)+'% completion',tagClass:'tt-g'},
    {ic:'ic3',icon:'❌',num:String(canc),label:'Cancelled / Rejected',tag:Math.round(canc/n*100)+'% rate',tagClass:'tt-a'},
    {ic:'ic4',icon:'💰',num:'$'+rev,label:'Completed Revenue',tag:'online consultations',tagClass:'tt-g'}
  ]);
  var byType={Video:0,Voice:0,Chat:0};all.forEach(function(c){byType[c.type]=(byType[c.type]||0)+1;});
  var mx=Math.max(byType.Video,byType.Voice,byType.Chat,1);
  var chart='<div class="panel"><div class="panel-hd"><h3>📊 Consultations by Type</h3></div><div class="panel-bd"><div class="chart-bars">'+
    ['Video','Voice','Chat'].map(function(k){var t=OC.type(k);
      return '<div class="cb-wrap"><div class="cb-val">'+byType[k]+'</div><div class="cb-bar" style="height:'+Math.round(byType[k]/mx*100)+'%"></div><div class="cb-label">'+t.ic+' '+k+'</div></div>';
    }).join('')+'</div></div></div>';
  var byDr={};all.forEach(function(c){var k=c.doctor.name;byDr[k]=byDr[k]||{n:0,done:0,canc:0};byDr[k].n++;if(c.status==='completed')byDr[k].done++;if(c.status==='cancelled')byDr[k].canc++;});
  var drRows=Object.keys(byDr).map(function(k){var d=byDr[k];
    return ['<strong>'+esc(k)+'</strong>',String(d.n),String(d.done),String(d.canc),'<span class="chip ch-g">'+Math.round(d.done/d.n*100)+'%</span>'];
  });
  var drTable=panelTable('👨‍⚕️ Consultations by Doctor','<button class="btn primary" onclick="OCA.exportCsv()">⬇ Export Full Report (CSV)</button>',
    ['Doctor','Total','Completed','Cancelled','Completion Rate'],drRows);
  var trail=all.slice(0,6).map(function(c){return c.audit[0]?'<div class="oc-notif-item"><div class="ic">📜</div><div>'+esc(c.id)+' — '+esc(c.audit[0].a)+'<span class="tm">'+esc(c.audit[0].t)+' · '+esc(c.audit[0].w)+'</span></div></div>':'';}).join('');
  var audit='<div class="oc-notif-card"><div class="oc-notif-hd">🛡️ Recent Consultation Audit Trail</div>'+trail+'</div>';
  return OC.notifCard(3)+stats+chart+drTable+audit;
};
})();
</script>

<!-- ============================================================
     DrInsight · Patient Q&A Core (shared across Patient, Doctor
     & Admin dashboards). Workflow: patient submits → Admin reviews
     (approve/reject) → doctor answers approved questions → answer
     instantly visible to patient. Synced via localStorage.
     ============================================================ -->
<script id="qa-core-script">
(function(){
if(window.QA)return;
var QA=window.QA={};
var LS='drinsight_qa_v1';
var esc=function(s){return (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');};
QA.esc=esc;
function stamp(){var d=new Date();return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'})+' · '+d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});}
QA.stamp=stamp;
function pad(n){return n<10?'0'+n:''+n;}
function iso(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function disp(d){return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}

/* ---------- departments & doctor directory (Ask Question wizard) ---------- */
QA.DEPTS=[
  {name:'Cardiology',ic:'❤️',desc:'Heart & vascular conditions'},
  {name:'Neurology',ic:'🧠',desc:'Brain, nerves & headaches'},
  {name:'Endocrinology',ic:'🦋',desc:'Diabetes, thyroid & hormones'},
  {name:'General Medicine',ic:'🩺',desc:'Everyday health concerns'}
];
QA.DRS=[
  {name:'Dr. Javed Kumbhar',init:'JK',bg:'linear-gradient(135deg,#0f3d7a,#1a56a0)',dept:'Cardiology',spec:'Interventional Cardiology',qual:'MBBS, FCPS (Cardiology)',exp:'15+ years',avail:'🟢 Available today'},
  {name:'Dr. Sarah Mitchell',init:'SM',bg:'linear-gradient(135deg,#7c3aed,#a78bfa)',dept:'Cardiology',spec:'Clinical Cardiology',qual:'MBBS, MD (Cardiology)',exp:'12+ years',avail:'🟢 Available Mon–Fri'},
  {name:'Dr. James Okafor',init:'JO',bg:'linear-gradient(135deg,#0891b2,#06b6d4)',dept:'Neurology',spec:'Neurology & Headache Medicine',qual:'MBBS, FRCP (Neurology)',exp:'18+ years',avail:'🟡 Next slot: tomorrow'},
  {name:'Dr. Priya Sharma',init:'PS',bg:'linear-gradient(135deg,#059669,#10b981)',dept:'Endocrinology',spec:'Diabetes & Thyroid',qual:'MBBS, FCPS (Endocrinology)',exp:'10+ years',avail:'🟢 Available today'},
  {name:'Dr. Hina Qureshi',init:'HQ',bg:'linear-gradient(135deg,#d97706,#fbbf24)',dept:'General Medicine',spec:'Family Medicine',qual:'MBBS, MRCGP',exp:'9+ years',avail:'🔴 On leave this week'}
];
QA.deptIc=function(d){var x=QA.DEPTS.find(function(v){return v.name===d;});return x?x.ic:'🩺';};
QA.dr=function(name){return QA.DRS.find(function(v){return v.name===name;});};
QA.ME_PATIENT='Sarah Johnson'; QA.ME_DOCTOR='Dr. Javed Kumbhar';
var PT={SJ:{name:'Sarah Johnson',init:'SJ',bg:'linear-gradient(135deg,#1a56a0,#4a90d9)'},
        AR:{name:'Ahmed Raza',init:'AR',bg:'linear-gradient(135deg,#7c3aed,#8b5cf6)'},
        NB:{name:'Nadia Baig',init:'NB',bg:'linear-gradient(135deg,#be185d,#ec4899)'}};

/* ---------- seed data (one question in every workflow state) ---------- */
function Q(id,pt,drName,title,details,dO,status,extra){
  var d=QA.dr(drName);
  var q={id:id,patient:PT[pt],dept:d.dept,doctor:{name:d.name,init:d.init,bg:d.bg,spec:d.spec},
    title:title,details:details,attachments:[],date:disp(dO),dateISO:iso(dO),
    status:status,answer:null,answerDraft:'',rejectReason:'',
    audit:[{t:stamp(),w:PT[pt].name+' (Patient)',a:'Question submitted — awaiting Admin review'}]};
  for(var k in (extra||{}))q[k]=extra[k];
  return q;
}
function shift(n){var d=new Date();d.setDate(d.getDate()+n);return d;}
function seed(){
  return [
    Q('QA-3001','SJ','Dr. Javed Kumbhar','Is a resting heart rate of 55 normal?','My smartwatch shows a resting heart rate of 55 bpm most mornings. I exercise 3x a week. Should I be concerned?',shift(0),'pending'),
    Q('QA-3002','SJ','Dr. Javed Kumbhar','Can I exercise with mild mitral regurgitation?','My last echo mentioned "trace-to-mild mitral regurgitation". Is it safe to continue running and light weight training?',shift(-1),'approved',
      {attachments:['echo-report-may2026.pdf'],audit:[
        {t:stamp(),w:'Admin',a:'Question approved — assigned to Dr. Javed Kumbhar and now visible on the doctor dashboard'},
        {t:stamp(),w:'Sarah Johnson (Patient)',a:'Question submitted — awaiting Admin review'}]}),
    Q('QA-3003','AR','Dr. Javed Kumbhar','Aspirin 75mg together with Clopidogrel?','I take Clopidogrel 75mg after stenting. My GP suggested adding Aspirin 75mg. Is dual therapy safe long-term for me?',shift(-2),'approved',
      {answerDraft:'Dual antiplatelet therapy is standard for 6–12 months post-stent, after which...',audit:[
        {t:stamp(),w:'Dr. Javed Kumbhar (Doctor)',a:'Answer draft saved (not yet submitted)'},
        {t:stamp(),w:'Admin',a:'Question approved — assigned to Dr. Javed Kumbhar'},
        {t:stamp(),w:'Ahmed Raza (Patient)',a:'Question submitted — awaiting Admin review'}]}),
    Q('QA-3004','SJ','Dr. Priya Sharma','What HbA1c target should I aim for?','I am 34, pre-diabetic (HbA1c 6.2%) on Metformin 500mg BD. What target should I aim for at my next test?',shift(-14),'answered',
      {answer:{text:'For your age and profile, aim for an HbA1c below 5.7% (ideally 5.4–5.6%) over the next 6 months. Continue Metformin 500mg BD, keep 150 min/week of moderate exercise, and recheck in 3 months. If the next reading stays above 6.0% we will revisit the dose.',t:stamp(),w:'Dr. Priya Sharma'},
       audit:[{t:stamp(),w:'Dr. Priya Sharma (Doctor)',a:'Answer submitted — instantly visible to the patient'},
              {t:stamp(),w:'Admin',a:'Question approved — assigned to Dr. Priya Sharma'},
              {t:stamp(),w:'Sarah Johnson (Patient)',a:'Question submitted — awaiting Admin review'}]}),
    Q('QA-3005','SJ','Dr. James Okafor','Headache medication question','Which is better for my migraines, drug A or drug B?',shift(-5),'rejected',
      {rejectReason:'Duplicate of your earlier question QA-2210. Please add details (frequency, triggers, current meds) and resubmit.',
       audit:[{t:stamp(),w:'Admin',a:'Question rejected — Duplicate of QA-2210; more details requested'},
              {t:stamp(),w:'Sarah Johnson (Patient)',a:'Question submitted — awaiting Admin review'}]}),
    Q('QA-3006','NB','Dr. Sarah Mitchell','Palpitations at night — Holter says rare PVCs','My Holter monitor report says "rare PVCs". I feel skipped beats at night. Is this dangerous?',shift(0),'pending')
  ];
}

/* ---------- persistence + cross-dashboard sync ---------- */
var DB=null;
function load(){try{var r=localStorage.getItem(LS);if(r){DB=JSON.parse(r);if(Array.isArray(DB))return;}}catch(e){}DB=seed();save(false);}
function save(fire){try{localStorage.setItem(LS,JSON.stringify(DB));}catch(e){}
  if(fire!==false&&typeof window.QA_RERENDER==='function')window.QA_RERENDER();}
load();
QA.all=function(){return DB;};
QA.get=function(id){return DB.find(function(q){return q.id===id;});};
QA.save=save;
QA.nextId=function(){return 'QA-'+(3000+DB.length+1);};
function audit(q,w,a){q.audit.unshift({t:stamp(),w:w,a:a});}
function notify(ic,text){if(window.OC&&OC.notify)OC.notify(ic,text);}

/* ---------- workflow transitions ---------- */
QA.submit=function(q){
  DB.push(q);
  notify('💬','New question '+q.id+' submitted by '+q.patient.name+' ('+q.dept+') — awaiting Admin review');
  save();
};
QA.update=function(id,title,details){var q=QA.get(id);if(!q||q.status!=='pending')return false;
  q.title=title;q.details=details;audit(q,q.patient.name+' (Patient)','Question edited before Admin approval');
  save();return true;};
QA.remove=function(id){var i=DB.findIndex(function(q){return q.id===id;});
  if(i>-1&&(DB[i].status==='pending'||DB[i].status==='rejected')){DB.splice(i,1);save();return true;}return false;};
QA.approve=function(id){var q=QA.get(id);if(!q)return;
  q.status='approved';q.rejectReason='';
  audit(q,'Admin','Question approved — assigned to '+q.doctor.name+' and now visible on the doctor dashboard');
  notify('✅','Question '+q.id+' approved by Admin — new question assigned to '+q.doctor.name);
  save();};
QA.reject=function(id,reason){var q=QA.get(id);if(!q)return;
  q.status='rejected';q.rejectReason=reason||'Not specified';
  audit(q,'Admin','Question rejected — '+(reason||'no reason given'));
  notify('⛔','Question '+q.id+' rejected by Admin — '+q.patient.name+' notified');
  save();};
QA.reassign=function(id,drName){var q=QA.get(id);var d=QA.dr(drName);if(!q||!d)return;
  q.doctor={name:d.name,init:d.init,bg:d.bg,spec:d.spec};q.dept=d.dept;
  audit(q,'Admin','Question reassigned to '+d.name+' ('+d.dept+')');
  notify('🔁','Question '+q.id+' reassigned to '+d.name);
  save();};
QA.saveDraft=function(id,text){var q=QA.get(id);if(!q)return;
  q.answerDraft=text;audit(q,q.doctor.name+' (Doctor)','Answer draft saved (not yet submitted)');
  save();};
QA.answer=function(id,text){var q=QA.get(id);if(!q||!text)return;
  q.status='answered';q.answer={text:text,t:stamp(),w:q.doctor.name};q.answerDraft='';
  audit(q,q.doctor.name+' (Doctor)','Answer submitted — instantly visible to the patient');
  notify('💬',q.doctor.name+' answered question '+q.id+' — answer now available to '+q.patient.name);
  save();};

/* ---------- filtered views (role-based access) ---------- */
QA.forPatient=function(status){return DB.filter(function(q){return q.patient.name===QA.ME_PATIENT&&(!status||q.status===status);});};
/* doctors only ever see Admin-approved (or answered) questions in full */
QA.forDoctor=function(view){
  var mine=DB.filter(function(q){return q.doctor.name===QA.ME_DOCTOR;});
  if(view==='new')return mine.filter(function(q){return q.status==='approved'&&!q.answerDraft;});
  if(view==='drafts')return mine.filter(function(q){return q.status==='approved'&&!!q.answerDraft;});
  if(view==='answered')return mine.filter(function(q){return q.status==='answered';});
  if(view==='rejected')return mine.filter(function(q){return q.status==='rejected';});
  return mine.filter(function(q){return q.status==='approved'||q.status==='answered';});
};

/* ---------- ui helpers ---------- */
QA.chip=function(q){
  if(q.status==='pending')return '<span class="cons-chip cc-pending">🕒 Pending Admin Approval</span>';
  if(q.status==='approved')return '<span class="cons-chip cc-up">✅ Approved — awaiting answer</span>';
  if(q.status==='answered')return '<span class="cons-chip cc-done">💬 Answered</span>';
  return '<span class="cons-chip cc-cancel">⛔ Rejected</span>';
};
QA.attHtml=function(q){return q.attachments.length?'<div>'+q.attachments.map(function(a){return '<span class="oc-att">📎 '+esc(a)+'</span>';}).join('')+'</div>':'';};
QA.auditHtml=function(q){return '<div class="cons-note-list">'+q.audit.map(function(a){return '<div class="cons-note-item">'+esc(a.a)+'<span class="cons-note-time">'+esc(a.t)+' — '+esc(a.w)+'</span></div>';}).join('')+'</div>';};

/* cross-tab sync */
window.addEventListener('storage',function(e){
  if(e.key===LS){try{DB=JSON.parse(e.newValue)||DB;}catch(err){}
    if(typeof window.QA_RERENDER==='function')window.QA_RERENDER();}
});
})();
</script>

<!-- ============================================================
     DrInsight · Patient Q&A (Admin) — Pending / Approved /
     Rejected / Answered / Reports. Review gate: doctors only see
     questions after Admin approval. Filters, search, reassignment
     and CSV export included.
     ============================================================ -->
<script id="qa-admin-script">
(function(){
if(window.QAA)return;
var QAA=window.QAA={};
var esc=QA.esc;

pageMeta['qa-pending']=['Patient Q&A · Pending Questions','New patient questions awaiting review — doctors cannot see these yet'];
pageMeta['qa-approved']=['Patient Q&A · Approved Questions','Approved and assigned — visible on the doctor dashboard'];
pageMeta['qa-rejected']=['Patient Q&A · Rejected Questions','Questions returned to patients with a reason'];
pageMeta['qa-answered']=['Patient Q&A · Answered','Doctor answers — instantly visible to patients'];
pageMeta['qa-reports']=['Patient Q&A · Reports','Volume, response & department analytics — export as CSV'];
(function(){var rp=window.renderPage;window.renderPage=function(id){
  if(id&&id.indexOf('qa-')===0)return id==='qa-reports'?pgQAReports():pgQA(id);
  return rp(id);
};})();
(function(){var prev=window.OC_RERENDER;window.QA_RERENDER=function(){
  if(window._admCur&&window._admCur.indexOf('qa-')===0)window.goto(window._admCur);};
  window.OC_RERENDER=window.OC_RERENDER||prev;
})();

/* ---------- filters + search ---------- */
var F={doctor:'',patient:'',dept:'',from:'',to:'',q:''};
QAA.setF=function(k,v){F[k]=v;window.goto(window._admCur);};
QAA.clearF=function(){F={doctor:'',patient:'',dept:'',from:'',to:'',q:''};window.goto(window._admCur);};
function opts(list,sel){return '<option value="">All</option>'+list.map(function(v){return '<option'+(v===sel?' selected':'')+'>'+esc(v)+'</option>';}).join('');}
function uniq(fn){var s={};QA.all().forEach(function(q){s[fn(q)]=1;});return Object.keys(s).sort();}
function filterBar(){
  return '<div class="panel"><div class="panel-hd"><h3>🔎 Filter &amp; Search Questions</h3><div class="btn-row"><button class="btn" onclick="QAA.clearF()">Reset</button></div></div><div class="panel-bd">'+
  '<div class="form-grid" style="grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px">'+
    '<div class="fg-item"><label>Search</label><input type="text" value="'+esc(F.q)+'" placeholder="ID, title, keywords..." onchange="QAA.setF(\'q\',this.value)"></div>'+
    '<div class="fg-item"><label>Doctor</label><select onchange="QAA.setF(\'doctor\',this.value)">'+opts(uniq(function(q){return q.doctor.name;}),F.doctor)+'</select></div>'+
    '<div class="fg-item"><label>Patient</label><select onchange="QAA.setF(\'patient\',this.value)">'+opts(uniq(function(q){return q.patient.name;}),F.patient)+'</select></div>'+
    '<div class="fg-item"><label>Department</label><select onchange="QAA.setF(\'dept\',this.value)">'+opts(uniq(function(q){return q.dept;}),F.dept)+'</select></div>'+
    '<div class="fg-item"><label>From</label><input type="date" value="'+F.from+'" onchange="QAA.setF(\'from\',this.value)"></div>'+
    '<div class="fg-item"><label>To</label><input type="date" value="'+F.to+'" onchange="QAA.setF(\'to\',this.value)"></div>'+
  '</div></div></div>';
}
function applyF(list){
  var s=F.q.toLowerCase();
  return list.filter(function(q){
    if(F.doctor&&q.doctor.name!==F.doctor)return false;
    if(F.patient&&q.patient.name!==F.patient)return false;
    if(F.dept&&q.dept!==F.dept)return false;
    if(F.from&&q.dateISO<F.from)return false;
    if(F.to&&q.dateISO>F.to)return false;
    if(s&&(q.id+' '+q.title+' '+q.details).toLowerCase().indexOf(s)===-1)return false;
    return true;
  });
}
function aChip(q){
  if(q.status==='pending')return '<span class="chip ch-a">🕒 Pending</span>';
  if(q.status==='approved')return '<span class="chip ch-b">✅ Approved</span>';
  if(q.status==='answered')return '<span class="chip ch-g">💬 Answered</span>';
  return '<span class="chip ch-r">⛔ Rejected</span>';
}
function avat(p){return '<div style="display:flex;align-items:center;gap:8px"><div class="cell-av" style="background:'+p.bg+'">'+p.init+'</div><span>'+esc(p.name)+'</span></div>';}

/* ---------- list pages ---------- */
var TITLES={'qa-pending':'🕒 Pending Questions — review gate','qa-approved':'✅ Approved Questions','qa-rejected':'⛔ Rejected Questions','qa-answered':'💬 Answered Questions'};
window.pgQA=function(view){
  var status=view.replace('qa-','');
  var list=applyF(QA.all().filter(function(q){return q.status===status;})).slice().sort(function(a,b){return a.dateISO<b.dateISO?1:-1;});
  var c={pending:0,approved:0,answered:0,rejected:0};
  QA.all().forEach(function(q){c[q.status]++;});
  var stats=statCards([
    {ic:'ic3',icon:'🕒',num:String(c.pending),label:'Pending Review',tag:'hidden from doctors',tagClass:'tt-a'},
    {ic:'ic1',icon:'✅',num:String(c.approved),label:'Approved',tag:'with doctors',tagClass:'tt-b'},
    {ic:'ic2',icon:'💬',num:String(c.answered),label:'Answered',tag:'visible to patients',tagClass:'tt-g'},
    {ic:'ic4',icon:'⛔',num:String(c.rejected),label:'Rejected',tag:'returned',tagClass:'tt-a'}
  ]);
  var rows=list.map(function(q){
    var quick=q.status==='pending'
      ?'<button class="tbl-btn view" onclick="QA.approve(\''+q.id+'\');showToast(\'✅ '+q.id+' approved — now visible to '+esc(q.doctor.name)+'\')">✓ Approve</button><button class="tbl-btn" onclick="QAA.reject(\''+q.id+'\')">⛔ Reject</button>'
      :'';
    return ['<strong>'+q.id+'</strong>',avat(q.patient),
      '<div style="max-width:230px"><b style="font-size:.8rem">'+esc(q.title)+'</b>'+(q.attachments.length?'<div style="font-size:.66rem;color:var(--gray-400)">📎 '+q.attachments.length+' attachment'+(q.attachments.length>1?'s':'')+'</div>':'')+'</div>',
      QA.deptIc(q.dept)+' '+esc(q.dept),avat(q.doctor),esc(q.date),aChip(q),
      '<div style="display:flex;gap:6px;flex-wrap:wrap"><button class="tbl-btn" onclick="QAA.view(\''+q.id+'\')">👁 View</button>'+quick+'</div>'];
  });
  var table=rows.length
    ?panelTable(TITLES[view]||'Questions','<button class="btn" onclick="QAA.exportCsv()">⬇ Export CSV</button>',
      ['ID','Patient','Question','Department','Assigned Doctor','Submitted','Status','Actions'],rows,
      'Showing '+rows.length+' question'+(rows.length===1?'':'s'))
    :'<div class="panel"><div class="panel-hd"><h3>'+(TITLES[view]||'Questions')+'</h3></div><div class="panel-bd"><div class="oc-empty"><span class="big">💬</span>No questions match the current filters.</div></div></div>';
  return (window.OC?OC.notifCard(3):'')+stats+filterBar()+table;
};

/* ---------- review modal (approve / reject / reassign) ---------- */
QAA.view=function(id){var q=QA.get(id);if(!q)return;
  var drOpts=QA.DRS.map(function(d){return '<option'+(d.name===q.doctor.name?' selected':'')+'>'+esc(d.name)+'</option>';}).join('');
  var html='<div class="modal"><div class="modal-hd"><h3>💬 '+q.id+' — Review</h3><button class="modal-close" onclick="closeModal()">✕</button></div>'+
  '<div class="modal-bd">'+
  '<div class="form-grid" style="grid-template-columns:1fr 1fr;gap:10px">'+
    '<div class="fg-item"><label>Patient</label><input value="'+esc(q.patient.name)+'" readonly></div>'+
    '<div class="fg-item"><label>Department</label><input value="'+esc(q.dept)+'" readonly></div>'+
    '<div class="fg-item"><label>Submitted</label><input value="'+esc(q.date)+'" readonly></div>'+
    '<div class="fg-item"><label>Status</label><input value="'+q.status+'" readonly></div>'+
    '<div class="fg-item full"><label>Title</label><input value="'+esc(q.title)+'" readonly></div>'+
  '</div>'+
  '<div style="margin-top:12px;background:var(--gray-50);border-left:3px solid var(--blue);border-radius:8px;padding:10px 13px;font-size:.82rem">'+esc(q.details)+'</div>'+
  (q.attachments.length?'<div style="margin-top:8px">'+q.attachments.map(function(a){return '<span class="oc-att">📎 '+esc(a)+'</span>';}).join('')+'</div>':'')+
  (q.answer?'<div style="margin-top:12px;background:#f0fdf4;border-left:3px solid #16a34a;border-radius:8px;padding:10px 13px;font-size:.82rem"><b>💬 Answer by '+esc(q.answer.w)+':</b> '+esc(q.answer.text)+'<div style="font-size:.66rem;color:var(--gray-400);margin-top:4px">'+esc(q.answer.t)+'</div></div>':'')+
  (q.rejectReason?'<p style="font-size:.8rem;color:var(--red);margin-top:10px"><b>⛔ Rejection reason:</b> '+esc(q.rejectReason)+'</p>':'')+
  '<div class="form-grid" style="grid-template-columns:1fr auto;gap:10px;margin-top:14px;align-items:end">'+
    '<div class="fg-item"><label>Assign / Reassign Doctor</label><select id="qaa-reassign">'+drOpts+'</select></div>'+
    '<button class="btn" onclick="QAA.doReassign(\''+q.id+'\')">🔁 Reassign</button></div>'+
  '<div style="margin-top:12px"><label style="font-size:.72rem;font-weight:700;color:var(--gray-500);text-transform:uppercase">Audit Log</label>'+
    q.audit.map(function(a){return '<div style="background:var(--gray-50);border-left:3px solid var(--gray-200);border-radius:8px;padding:7px 11px;font-size:.78rem;margin-top:6px">'+esc(a.a)+'<div style="font-size:.66rem;color:var(--gray-400);margin-top:2px">'+esc(a.t)+' — '+esc(a.w)+'</div></div>';}).join('')+'</div>'+
  '</div><div class="modal-ft">'+
    (q.status==='pending'?'<button class="btn green" onclick="QA.approve(\''+q.id+'\');closeModal();showToast(\'✅ Approved — now visible to the doctor\')">✓ Approve</button><button class="btn danger" onclick="closeModal();QAA.reject(\''+q.id+'\')">⛔ Reject</button>':'')+
    '<button class="btn" onclick="closeModal()">Close</button></div></div>';
  var m=document.getElementById('modalMount');m.innerHTML=html;m.classList.remove('hidden');
};
QAA.doReassign=function(id){
  var v=(document.getElementById('qaa-reassign')||{}).value;
  QA.reassign(id,v);closeModal();showToast('🔁 '+id+' reassigned to '+v);
};
QAA.reject=function(id){var q=QA.get(id);if(!q)return;
  var html='<div class="modal"><div class="modal-hd"><h3>⛔ Reject '+q.id+'</h3><button class="modal-close" onclick="closeModal()">✕</button></div>'+
  '<div class="modal-bd"><p style="font-size:.84rem">Reject “'+esc(q.title)+'” from <b>'+esc(q.patient.name)+'</b>? The patient is notified with your reason.</p>'+
  '<div class="fg-item" style="margin-top:10px"><label>Reason</label><input type="text" id="qaa-rej-why" placeholder="e.g. Needs more detail — please resubmit"></div></div>'+
  '<div class="modal-ft"><button class="btn" onclick="closeModal()">Back</button><button class="btn danger" onclick="QA.reject(\''+q.id+'\',(document.getElementById(\'qaa-rej-why\')||{}).value);closeModal();showToast(\'⛔ '+q.id+' rejected — patient notified\')">⛔ Reject Question</button></div></div>';
  var m=document.getElementById('modalMount');m.innerHTML=html;m.classList.remove('hidden');
};

/* ---------- export + reports ---------- */
QAA.exportCsv=function(){
  var head=['ID','Patient','Doctor','Department','Title','Submitted','Status','Attachments','Answered By','Answer','Rejection Reason'];
  var lines=[head.join(',')].concat(QA.all().map(function(q){
    return [q.id,q.patient.name,q.doctor.name,q.dept,q.title,q.date,q.status,q.attachments.join('; '),(q.answer?q.answer.w:''),(q.answer?q.answer.text:''),q.rejectReason]
      .map(function(v){return '"'+String(v).replace(/"/g,'""')+'"';}).join(',');
  }));
  var blob=new Blob([lines.join('\n')],{type:'text/csv'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='drinsight-patient-qa-report.csv';document.body.appendChild(a);a.click();a.remove();
  showToast('⬇ Patient Q&A report exported (CSV)');
};
window.pgQAReports=function(){
  var all=QA.all(),n=all.length;
  var c={pending:0,approved:0,answered:0,rejected:0};
  all.forEach(function(q){c[q.status]++;});
  var stats=statCards([
    {ic:'ic1',icon:'💬',num:String(n),label:'Total Questions',tag:'all departments',tagClass:'tt-b'},
    {ic:'ic2',icon:'✅',num:String(c.answered),label:'Answered',tag:Math.round(c.answered/n*100)+'% answer rate',tagClass:'tt-g'},
    {ic:'ic3',icon:'🕒',num:String(c.pending+c.approved),label:'In Progress',tag:c.pending+' pending review',tagClass:'tt-a'},
    {ic:'ic4',icon:'⛔',num:String(c.rejected),label:'Rejected',tag:Math.round(c.rejected/n*100)+'% rate',tagClass:'tt-a'}
  ]);
  var byDept={};all.forEach(function(q){byDept[q.dept]=(byDept[q.dept]||0)+1;});
  var keys=Object.keys(byDept),mx=Math.max.apply(null,keys.map(function(k){return byDept[k];}).concat([1]));
  var chart='<div class="panel"><div class="panel-hd"><h3>📊 Questions by Department</h3></div><div class="panel-bd"><div class="chart-bars">'+
    keys.map(function(k){return '<div class="cb-wrap"><div class="cb-val">'+byDept[k]+'</div><div class="cb-bar" style="height:'+Math.round(byDept[k]/mx*100)+'%"></div><div class="cb-label">'+QA.deptIc(k)+' '+esc(k)+'</div></div>';}).join('')+'</div></div></div>';
  var byDr={};all.forEach(function(q){var k=q.doctor.name;byDr[k]=byDr[k]||{n:0,ans:0};byDr[k].n++;if(q.status==='answered')byDr[k].ans++;});
  var rows=Object.keys(byDr).map(function(k){var d=byDr[k];
    return ['<strong>'+esc(k)+'</strong>',esc((QA.dr(k)||{}).dept||''),String(d.n),String(d.ans),'<span class="chip ch-g">'+Math.round(d.ans/d.n*100)+'%</span>'];});
  var tbl=panelTable('👨‍⚕️ Questions by Doctor','<button class="btn primary" onclick="QAA.exportCsv()">⬇ Export Full Report (CSV)</button>',
    ['Doctor','Department','Assigned','Answered','Answer Rate'],rows);
  return (window.OC?OC.notifCard(3):'')+stats+chart+tbl;
};
})();
</script>

</body>
</html>
